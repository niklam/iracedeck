<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" data-no-na="true">
  <g filter="url(#activity-state)">
    <!-- Fuel pump body -->
    <rect x="18" y="6" width="20" height="30" rx="2" fill="none" stroke="#e74c3c" stroke-width="2.5"/>

    <!-- Fuel gauge inside pump -->
    <rect x="22" y="10" width="12" height="8" rx="1" fill="none" stroke="#e74c3c" stroke-width="1.5"/>

    <!-- Hose -->
    <path d="M38 14 h6 a4 4 0 0 1 4 4 v14" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Nozzle -->
    <path d="M48 32 l6 -2 v8 l-6 -2 z" fill="#e74c3c"/>

    <!-- Minus sign -->
    <rect x="52" y="10" width="12" height="3" rx="1" fill="#e74c3c"/>

    <!-- Amount text -->
    <text x="36" y="65" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">{{amount}}</text>
  </g>
</svg>
