<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Fuel pump icon - fills top half (y 6 to 36), leaving bottom for fuel display -->
  <!-- Gray pump with red X on top when fuel fill is disabled -->

  <!-- Fuel pump body (gray) -->
  <rect x="18" y="6" width="20" height="30" rx="2" fill="none" stroke="#888888" stroke-width="2.5"/>

  <!-- Fuel gauge inside pump -->
  <rect x="22" y="10" width="12" height="8" rx="1" fill="none" stroke="#888888" stroke-width="1.5"/>

  <!-- Hose -->
  <path d="M38 14 h6 a4 4 0 0 1 4 4 v14" fill="none" stroke="#888888" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nozzle -->
  <path d="M48 32 l6 -2 v8 l-6 -2 z" fill="#888888"/>

  <!-- Red X centered horizontally (x 21-51), bigger size -->
  <line x1="21" y1="6" x2="51" y2="36" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
  <line x1="51" y1="6" x2="21" y2="36" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
</svg>
