<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Car body -->
  <rect x="6" y="3" width="8" height="14" rx="1.5" fill="none"/>
  <!-- Left Front tire -->
  <rect x="2" y="4" width="3" height="4" rx="0.5" fill="#FFFFFF" stroke="none"/>
  <!-- Right Front tire -->
  <rect x="15" y="4" width="3" height="4" rx="0.5" fill="#FFFFFF" stroke="none"/>
  <!-- Left Rear tire -->
  <rect x="2" y="12" width="3" height="4" rx="0.5" fill="#FFFFFF" stroke="none"/>
  <!-- Right Rear tire -->
  <rect x="15" y="12" width="3" height="4" rx="0.5" fill="#FFFFFF" stroke="none"/>
</svg>
