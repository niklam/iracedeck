<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script src="sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Key Text">
			<sdpi-textarea
				setting="keyText"
				placeholder="Text to display on key..."
				rows="1"
			></sdpi-textarea>
		</sdpi-item>
		<sdpi-item label="Message">
			<sdpi-textarea
				setting="message"
				placeholder="Enter message to send to iRacing chat..."
				maxlength="200"
				rows="3"
			></sdpi-textarea>
		</sdpi-item>
		<sdpi-item label="Icon Color">
			<sdpi-color setting="iconColor" default="#4a90d9"></sdpi-color>
		</sdpi-item>
	</body>
</html>
