<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<script src="sdpi-components.js"></script>
		<script src="pi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Hotkey">
			<ird-key-binding setting="hotkey" default="F1"></ird-key-binding>
		</sdpi-item>
		<sdpi-item label="Custom Label">
			<sdpi-textfield
				setting="label"
				placeholder="Leave empty to show key combination"
			></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Icon Color">
			<sdpi-color setting="iconColor" default="#4a90d9"></sdpi-color>
		</sdpi-item>
	</body>
</html>
