<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Black box display frame -->
  <rect x="2" y="3" width="14" height="10" rx="1.5" ry="1.5"/>
  <!-- Inner screen -->
  <rect x="3.5" y="4.5" width="11" height="7" rx="1" ry="1"/>
  <!-- BB badge -->
  <rect x="12" y="1" width="6" height="4" rx="1" fill="#FFFFFF" stroke="none"/>
  <text x="15" y="3.5" text-anchor="middle" dominant-baseline="central"
        fill="#000000" font-family="sans-serif" font-size="3" font-weight="bold">BB</text>
  <!-- Content lines -->
  <line x1="5" y1="6.5" x2="13" y2="6.5" stroke-width="1"/>
  <line x1="5" y1="8.5" x2="11" y2="8.5" stroke-width="1"/>
  <line x1="5" y1="10.5" x2="12" y2="10.5" stroke-width="1"/>
</svg>
