  <circle cx="36" cy="24" r="5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="36" cy="24" r="2" fill="#ffffff"/>
  <!-- Left arrow -->
  <path d="M14 38 L10 38 L13 35" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right arrow -->
