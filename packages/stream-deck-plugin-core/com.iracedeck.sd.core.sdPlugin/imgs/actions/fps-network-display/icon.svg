<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Monitor frame -->
  <rect x="2" y="2" width="14" height="10" rx="1.5" ry="1.5"/>
  <!-- Monitor stand -->
  <line x1="9" y1="12" x2="9" y2="14" stroke-width="1.2"/>
  <line x1="6" y1="14" x2="12" y2="14" stroke-width="1.2"/>
  <!-- FPS text -->
  <text x="5" y="8" fill="#FFFFFF" stroke="none" font-family="sans-serif" font-size="4" font-weight="bold">FPS</text>
  <!-- Network bars -->
  <rect x="12" y="7" width="2" height="3" fill="#FFFFFF" stroke="none" rx="0.3"/>
  <rect x="14.5" y="5.5" width="2" height="4.5" fill="#FFFFFF" stroke="none" rx="0.3"/>
</svg>
