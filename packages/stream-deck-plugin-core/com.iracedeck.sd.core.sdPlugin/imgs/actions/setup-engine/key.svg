<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#2a3a1a"/>

  <!-- Engine block with lightning bolt + increase arrow (matches engine-power increase icon content) -->
  <rect x="16" y="14" width="28" height="20" rx="3" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="22" y1="14" x2="22" y2="10" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="14" x2="30" y2="10" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="14" x2="38" y2="10" stroke="#888888" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="27,20 30,26 27,26 30,32" fill="none" stroke="#f1c40f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="53,28 58,22 53,16" fill="none" stroke="#f1c40f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">ENG POWER</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#aaaaaa" font-family="Arial, sans-serif" font-size="8">INCREASE</text>
</svg>
