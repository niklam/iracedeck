<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
</style>

	</head>
	<body>
		<sdpi-item label="Mode">
			<sdpi-select id="mode-select" setting="mode" default="direct">
				<option value="direct">Direct</option>
				<option value="next">Next</option>
				<option value="previous">Previous</option>
			</sdpi-select>
		</sdpi-item>

		<!-- Direct mode: black box selector -->
		<sdpi-item label="Black Box" id="blackbox-item">
			<sdpi-select id="blackbox-select" setting="blackBox" default="lap-timing">
				<option value="lap-timing">Lap Timing</option>
				<option value="standings">Standings</option>
				<option value="relative">Relative</option>
				<option value="fuel">Fuel</option>
				<option value="tires">Tires</option>
				<option value="tire-info">Tire Info</option>
				<option value="pit-stop">Pit-stop Adjustments</option>
				<option value="in-car">In-car Adjustments</option>
				<option value="mirror">Mirror Adjustments</option>
				<option value="radio">Radio Adjustments</option>
				<option value="weather">Weather</option>
			</sdpi-select>
		</sdpi-item>

		<!-- Global Key Bindings section -->
		<!--
  Global Key Bindings Component

  Displays key binding inputs in a collapsible "Global Settings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - subtitle: String (optional) - Section subtitle (e.g., "Black Box Key Bindings")
    - keyBindings: Array with objects containing id, label, default, setting
    - open: Boolean (optional) - Whether to start expanded (default: false)
-->



<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    <div class="ird-section-subtitle">Black Box Key Bindings</div><sdpi-item label="Lap Timing"><ird-key-binding setting="blackBoxLapTiming" default="F1" global></ird-key-binding></sdpi-item><sdpi-item label="Standings"><ird-key-binding setting="blackBoxStandings" default="F2" global></ird-key-binding></sdpi-item><sdpi-item label="Relative"><ird-key-binding setting="blackBoxRelative" default="F3" global></ird-key-binding></sdpi-item><sdpi-item label="Fuel"><ird-key-binding setting="blackBoxFuel" default="F4" global></ird-key-binding></sdpi-item><sdpi-item label="Tires"><ird-key-binding setting="blackBoxTires" default="F5" global></ird-key-binding></sdpi-item><sdpi-item label="Tire Info"><ird-key-binding setting="blackBoxTireInfo" default="F6" global></ird-key-binding></sdpi-item><sdpi-item label="Pit-stop Adjustments"><ird-key-binding setting="blackBoxPitStop" default="F7" global></ird-key-binding></sdpi-item><sdpi-item label="In-car Adjustments"><ird-key-binding setting="blackBoxInCar" default="F8" global></ird-key-binding></sdpi-item><sdpi-item label="Mirror Adjustments"><ird-key-binding setting="blackBoxMirror" default="F9" global></ird-key-binding></sdpi-item><sdpi-item label="Radio Adjustments"><ird-key-binding setting="blackBoxRadio" default="F10" global></ird-key-binding></sdpi-item><sdpi-item label="Weather"><ird-key-binding setting="blackBoxWeather" default="F11" global></ird-key-binding></sdpi-item><sdpi-item label="Cycle Next"><ird-key-binding setting="blackBoxCycleNext" default="" global></ird-key-binding></sdpi-item><sdpi-item label="Cycle Previous"><ird-key-binding setting="blackBoxCyclePrevious" default="" global></ird-key-binding></sdpi-item>
  </div>
</details>



		<script>
			function updateVisibility(mode) {
				const blackboxItem = document.getElementById("blackbox-item");
				if (!blackboxItem) return;

				// Show black box selector only in Direct mode
				blackboxItem.classList.toggle("hidden", mode !== "direct");
			}

			// Wait for web components to be defined
			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const modeSelect = document.getElementById("mode-select");

				if (modeSelect) {
					// Get initial value and update visibility
					const initialMode = modeSelect.value || "direct";
					updateVisibility(initialMode);

					// Listen for changes
					modeSelect.addEventListener("change", (ev) => {
						const mode = ev.target.value || "direct";
						updateVisibility(mode);
					});
				}
			}

			// Initialize when DOM is ready
			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>
	</body>
</html>
