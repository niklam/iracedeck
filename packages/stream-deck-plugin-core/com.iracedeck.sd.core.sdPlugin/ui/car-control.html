<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
</style>

	</head>
	<body>
		<sdpi-item label="Control">
			<sdpi-select setting="control" default="starter">
				<option value="starter">Starter</option>
				<option value="ignition">Ignition</option>
				<option value="pit-speed-limiter">Pit Speed Limiter</option>
				<option value="enter-exit-tow">Enter/Exit/Tow Car</option>
				<option value="pause-sim">Pause Sim</option>
			</sdpi-select>
		</sdpi-item>

		<!-- Global Key Bindings section -->
		<!--
  Global Key Bindings Component

  Displays key binding inputs in a collapsible "Global Settings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - subtitle: String (optional) - Section subtitle (e.g., "Black Box Key Bindings")
    - keyBindings: Array with objects containing id, label, default, setting
    - open: Boolean (optional) - Whether to start expanded (default: false)
-->



<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    <div class="ird-section-subtitle">Car Control Key Bindings</div><sdpi-item label="Starter"><ird-key-binding setting="carControlStarter" default="S" global></ird-key-binding></sdpi-item><sdpi-item label="Ignition"><ird-key-binding setting="carControlIgnition" default="I" global></ird-key-binding></sdpi-item><sdpi-item label="Pit Speed Limiter"><ird-key-binding setting="carControlPitSpeedLimiter" default="A" global></ird-key-binding></sdpi-item><sdpi-item label="Enter/Exit/Tow Car"><ird-key-binding setting="carControlEnterExitTow" default="Shift+R" global></ird-key-binding></sdpi-item><sdpi-item label="Pause Sim"><ird-key-binding setting="carControlPauseSim" default="Shift+P" global></ird-key-binding></sdpi-item>
  </div>
</details>


	</body>
</html>
