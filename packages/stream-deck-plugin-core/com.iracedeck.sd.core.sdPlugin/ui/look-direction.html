<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>

	</head>
	<body>
		<sdpi-item label="Direction">
			<sdpi-select setting="direction" default="look-left">
				<option value="look-left">Look Left</option>
				<option value="look-right">Look Right</option>
				<option value="look-up">Look Up</option>
				<option value="look-down">Look Down</option>
			</sdpi-select>
		</sdpi-item>

		<!-- Global Key Bindings section -->
		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Look Left">
    <ird-key-binding setting="lookDirectionLeft" default="Z" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Look Right">
    <ird-key-binding setting="lookDirectionRight" default="X" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Look Up">
    <ird-key-binding setting="lookDirectionUp" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Look Down">
    <ird-key-binding setting="lookDirectionDown" default="" global></ird-key-binding>
  </sdpi-item>
  
</div>

	</body>
</html>
