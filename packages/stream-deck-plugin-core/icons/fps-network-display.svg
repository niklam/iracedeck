<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <g filter="url(#activity-state)">
    <!-- Monitor frame -->
    <rect x="10" y="8" width="52" height="36" rx="3" ry="3"
          fill="none"
          stroke="{{color}}"
          stroke-width="2.5"
          stroke-linejoin="round"/>

    <!-- Monitor stand -->
    <line x1="36" y1="44" x2="36" y2="50" stroke="{{color}}" stroke-width="2"/>
    <line x1="26" y1="50" x2="46" y2="50" stroke="{{color}}" stroke-width="2" stroke-linecap="round"/>

    <!-- FPS text indicator (left side) -->
    <text x="18" y="28" fill="{{color}}" font-family="sans-serif" font-size="10" font-weight="bold">FPS</text>

    <!-- Network signal bars (right side) -->
    <rect x="44" y="30" width="4" height="6" fill="{{color}}" rx="0.5"/>
    <rect x="49" y="26" width="4" height="10" fill="{{color}}" rx="0.5"/>
    <rect x="54" y="22" width="4" height="14" fill="{{color}}" rx="0.5"/>

{{textElement}}
  </g>
</svg>
