<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a3a1a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: Tachometer arc with RPM needle + right arrow -->
    <path d="M32,72 A40,40 0 0,1 104,72" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="64" x2="40" y2="56" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <line x1="56" y1="44" x2="56" y2="36" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <line x1="76" y1="40" x2="76" y2="32" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <line x1="92" y1="52" x2="92" y2="44" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <line x1="68" y1="72" x2="84" y2="44" stroke="{{graphic1Color}}" stroke-width="4" stroke-linecap="round"/>
    <circle cx="68" cy="72" r="4" fill="{{graphic1Color}}"/>
    <polyline points="106,56 116,44 106,32" fill="none" stroke="#f1c40f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
