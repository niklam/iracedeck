<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#3a2a2a"/>

    <!-- Icon content area: checklist with checkmarks and X overlay -->
    <rect x="44" y="20" width="24" height="20" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <polyline points="50,30 54,36 62,24" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="44" y="48" width="24" height="20" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <polyline points="50,58 54,64 62,52" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="76" y1="30" x2="100" y2="30" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="76" y1="58" x2="100" y2="58" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="104" y2="64" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
    <line x1="104" y1="40" x2="80" y2="64" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
