<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a1a3a"/>

    <!-- Qualifying Tape increase: grille with tape + right arrow -->
    <rect x="36" y="28" width="56" height="44" rx="6" fill="none" stroke="#888888" stroke-width="3"/>
    <line x1="36" y1="40" x2="92" y2="40" stroke="#888888" stroke-width="1"/>
    <line x1="36" y1="52" x2="92" y2="52" stroke="#888888" stroke-width="1"/>
    <line x1="36" y1="64" x2="92" y2="64" stroke="#888888" stroke-width="1"/>
    <rect x="40" y="36" width="48" height="12" rx="2" fill="#f1c40f" opacity="0.6"/>
    <polyline points="106,56 116,44 106,32" fill="none" stroke="#f1c40f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
