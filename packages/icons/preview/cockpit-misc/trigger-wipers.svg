<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a2a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#2a2a3a"/>

    <!-- Icon content area: Windshield wiper arc with blade -->
    <path d="M32 68 A44 44 0 0 1 112 68" fill="none" stroke="#888888" stroke-width="3"/>
    <line x1="72" y1="68" x2="44" y2="28" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <circle cx="72" cy="68" r="5" fill="#ffffff"/>
    <path d="M44 28 A40 40 0 0 1 88 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,4"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
