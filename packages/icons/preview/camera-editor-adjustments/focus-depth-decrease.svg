<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a2a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#1a2a3a"/>

    <!-- Focus depth: blur near, sharp far, leftward arrow -->
    <circle cx="52" cy="44" r="16" fill="none" stroke="#888888" stroke-width="2"/>
    <circle cx="52" cy="44" r="6" fill="#888888"/>
    <circle cx="96" cy="44" r="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="96" cy="44" r="4" fill="#ffffff"/>
    <line x1="72" y1="72" x2="52" y2="72" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="58,66 52,72 58,78" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
