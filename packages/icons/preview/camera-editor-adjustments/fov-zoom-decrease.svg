<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a2a3a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#1a2a3a"/>

    <!-- Lens with minus sign -->
    <circle cx="64" cy="44" r="24" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="64" cy="44" r="12" fill="none" stroke="#888888" stroke-width="2"/>
    <circle cx="64" cy="44" r="4" fill="#ffffff"/>
    <line x1="100" y1="44" x2="116" y2="44" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
