<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a2a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#1a2a3a"/>

    <!-- Microphone with "A" auto label -->
    <rect x="60" y="20" width="24" height="36" rx="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M48 48 A24 20 0 0 0 96 48" fill="none" stroke="#888888" stroke-width="2"/>
    <line x1="72" y1="68" x2="72" y2="76" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <text x="108" y="44" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">A</text>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
