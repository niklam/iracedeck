<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a2a3a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#1a2a3a"/>

    <!-- Icon content area: eye shape with up-looking pupil -->
    <path d="M36 52 Q72 28 108 52 Q72 76 36 52 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="52" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="48" r="4" fill="#ffffff"/>
    <!-- Up arrow indicator -->
    <path d="M108 28 L108 16 L100 24" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M108 16 L116 24" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
