<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#8B1A1A","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#8B1A1A"/>
    <!-- Track surface with rubber indicator -->
    <path d="M36,76 C36,36 108,36 108,76" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <path d="M48,72 C48,48 96,48 96,72" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <!-- Percentage/rubber bars -->
    <rect x="50" y="78" width="8" height="8" fill="#ffffff" opacity="0.4"/>
    <rect x="62" y="74" width="8" height="12" fill="#ffffff" opacity="0.6"/>
    <rect x="74" y="70" width="8" height="16" fill="#ffffff" opacity="0.8"/>
    <rect x="86" y="66" width="8" height="20" fill="#ffffff"/>
    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
