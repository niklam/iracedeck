<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#8B1A1A","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#8B1A1A"/>
    <!-- Curved arrow going around -->
    <path d="M48,62 C48,36 96,36 96,62" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <polygon points="96,52 106,62 96,72" fill="#ffffff"/>
    <path d="M96,62 C96,80 48,80 48,62" fill="none" stroke="#ffffff" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>
    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
