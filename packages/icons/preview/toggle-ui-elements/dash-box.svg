<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a3a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#1a3a3a"/>

    <!-- Icon content area: dashboard panel with gauges -->
    <rect x="24" y="20" width="96" height="52" rx="6" fill="#1a2a2a" stroke="#888888" stroke-width="3"/>
    <circle cx="56" cy="46" r="16" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="56" y1="46" x2="64" y2="34" stroke="#ffffff" stroke-width="3"/>
    <circle cx="96" cy="46" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="96" y1="46" x2="100" y2="40" stroke="#ffffff" stroke-width="2"/>
    <rect x="32" y="64" width="16" height="4" rx="1" fill="#888888"/>
    <rect x="52" y="64" width="16" height="4" rx="1" fill="#888888"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
