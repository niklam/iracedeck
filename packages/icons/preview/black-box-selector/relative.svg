<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a2a2a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#2a2a2a"/>

    <!-- Black box frame -->
    <rect x="16" y="16" width="112" height="56" rx="6" fill="#2d2510" stroke="#4a3728" stroke-width="4"/>
    <rect x="24" y="22" width="8" height="6" rx="1" fill="#f39c12"/>
    <rect x="36" y="22" width="84" height="6" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="24" y="32" width="8" height="6" rx="1" fill="#e67e22"/>
    <rect x="36" y="32" width="76" height="6" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="24" y="42" width="8" height="6" rx="1" fill="#ffffff"/>
    <rect x="36" y="42" width="88" height="6" rx="1" fill="#ffffff"/>
    <rect x="24" y="52" width="8" height="6" rx="1" fill="#2ecc71"/>
    <rect x="36" y="52" width="72" height="6" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="24" y="62" width="8" height="6" rx="1" fill="#2ecc71" opacity="0.7"/>
    <rect x="36" y="62" width="80" height="6" rx="1" fill="#ffffff" opacity="0.5"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
