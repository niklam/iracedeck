<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a2a2a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#2a2a2a"/>

    <!-- Cycle next: up arrow with screen rows -->
    <rect x="36" y="64" width="72" height="8" rx="2" fill="#ffffff" opacity="0.4"/>
    <rect x="36" y="76" width="72" height="8" rx="2" fill="#ffffff" opacity="0.5"/>
    <rect x="36" y="88" width="72" height="8" rx="2" fill="#ffffff" opacity="0.6"/>
    <path d="M72 20 l-28 32 h18 v12 h20 v-12 h18 z" fill="#ffffff"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
