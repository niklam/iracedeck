<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a3a4a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#2a3a4a"/>

    <!-- Icon content area: Turtle silhouette (slower) -->
    <g fill="#ffffff" transform="translate(22, 20) scale(0.7)">
      <!-- Shell -->
      <ellipse cx="68" cy="48" rx="32" ry="24"/>
      <!-- Shell pattern lines -->
      <path d="M68,24 L68,72" stroke="#2a3a4a" stroke-width="2" fill="none"/>
      <path d="M50,30 L50,66" stroke="#2a3a4a" stroke-width="1.5" fill="none"/>
      <path d="M86,30 L86,66" stroke="#2a3a4a" stroke-width="1.5" fill="none"/>
      <!-- Head -->
      <ellipse cx="108" cy="52" rx="10" ry="8"/>
      <!-- Eye -->
      <circle cx="113" cy="49" r="2" fill="#2a3a4a"/>
      <!-- Front leg -->
      <ellipse cx="96" cy="70" rx="6" ry="10" transform="rotate(-15, 96, 70)"/>
      <!-- Back leg -->
      <ellipse cx="42" cy="68" rx="6" ry="10" transform="rotate(15, 42, 68)"/>
      <!-- Tail -->
      <path d="M36,54 Q26,50 30,58" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
