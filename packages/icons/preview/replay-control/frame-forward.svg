<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a3a4a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#2a3a4a"/>

    <!-- Film strip outline -->
    <rect x="24" y="24" width="96" height="56" rx="3" fill="none" stroke="#ffffff" stroke-width="3"/>

    <!-- Sprocket holes top row (square with rounded corners) -->
    <rect x="30" y="27" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="44" y="27" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="58" y="27" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="78" y="27" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="92" y="27" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="106" y="27" width="8" height="6" rx="1.5" fill="#ffffff"/>

    <!-- Sprocket holes bottom row -->
    <rect x="30" y="71" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="44" y="71" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="58" y="71" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="78" y="71" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="92" y="71" width="8" height="6" rx="1.5" fill="#ffffff"/>
    <rect x="106" y="71" width="8" height="6" rx="1.5" fill="#ffffff"/>

    <!-- Frame windows (rounded rectangles inside the strip) -->
    <rect x="30" y="37" width="36" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
    <rect x="78" y="37" width="36" height="30" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>

    <!-- Right arrow (frame forward) overlaid on right frame -->
    <polygon points="88,46 104,52 88,58" fill="#ffffff"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
