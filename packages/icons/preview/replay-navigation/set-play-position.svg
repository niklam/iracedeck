<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a3a4a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#2a3a4a"/>

    <!-- Icon content area: Crosshair/target -->
    <circle cx="72" cy="52" r="20" fill="none" stroke="#888888" stroke-width="4"/>
    <circle cx="72" cy="52" r="6" fill="#888888"/>
    <line x1="72" y1="24" x2="72" y2="36" stroke="#888888" stroke-width="4" stroke-linecap="round"/>
    <line x1="72" y1="68" x2="72" y2="80" stroke="#888888" stroke-width="4" stroke-linecap="round"/>
    <line x1="44" y1="52" x2="56" y2="52" stroke="#888888" stroke-width="4" stroke-linecap="round"/>
    <line x1="88" y1="52" x2="100" y2="52" stroke="#888888" stroke-width="4" stroke-linecap="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
