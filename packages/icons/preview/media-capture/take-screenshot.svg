<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a1a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#2a1a3a"/>

    <!-- Icon content area: still camera with flash -->
    <rect x="40" y="28" width="56" height="40" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="60" y="20" width="16" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="68" cy="48" r="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="68" cy="48" r="4" fill="#ffffff"/>
    <line x1="104" y1="24" x2="112" y2="24" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="108" y1="20" x2="108" y2="28" stroke="#888888" stroke-width="3" stroke-linecap="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
