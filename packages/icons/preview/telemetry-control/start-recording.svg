<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#3a2a3a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="#3a2a3a"/>

    <!-- Icon content area: record circle with data line -->
    <circle cx="72" cy="40" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="40" r="10" fill="#e74c3c"/>
    <line x1="28" y1="68" x2="116" y2="68" stroke="#888888" stroke-width="1.6"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
