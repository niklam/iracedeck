<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a1a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#1a1a3a"/>

    <!-- RF Brake Attached: brake disc with RF badge -->
    <circle cx="72" cy="48" r="28" fill="none" stroke="#ffffff" stroke-width="4"/>
    <circle cx="72" cy="48" r="14" fill="none" stroke="#888888" stroke-width="2"/>
    <text x="72" y="50" text-anchor="middle" dominant-baseline="central"
          fill="#f1c40f" font-family="Arial, sans-serif" font-size="16" font-weight="bold">RF</text>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
