    <line x1="72" y1="72" x2="68" y2="80" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
    <line x1="86" y1="72" x2="82" y2="80" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>

