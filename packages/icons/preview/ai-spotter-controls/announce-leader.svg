<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#3a4a5a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#3a4a5a"/>

    <!-- Icon content area: megaphone / flag -->
    <path d="M48 36v48l24-8V44l-24-8z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
    <path d="M72 44v32" stroke="#ffffff" stroke-width="4"/>
    <path d="M72 44c12-4 24-4 32 0" fill="none" stroke="#f1c40f" stroke-width="4" stroke-linecap="round"/>
    <path d="M72 76c12 4 24 4 32 0" fill="none" stroke="#f1c40f" stroke-width="4" stroke-linecap="round"/>
    <text x="90" y="62" text-anchor="middle" dominant-baseline="central"
          fill="#f1c40f" font-family="Arial, sans-serif" font-size="18" font-weight="bold">1</text>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
