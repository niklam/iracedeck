<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#3a4a5a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#3a4a5a"/>

    <!-- Icon content area: warning triangle with wrench -->
    <path d="M72 22L40 78h64L72 22z" fill="none" stroke="#e74c3c" stroke-width="4" stroke-linejoin="round"/>
    <line x1="72" y1="42" x2="72" y2="60" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
    <circle cx="72" cy="68" r="2.5" fill="#e74c3c"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
