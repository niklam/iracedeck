<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#3a3a1a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="#3a3a1a"/>

    <!-- Low Fuel Accept: small fuel droplet with checkmark -->
    <path d="M64 24 C64 24 48 44 48 54 C48 64 54 70 64 70 C74 70 80 64 80 54 C80 44 64 24 64 24Z"
          fill="none" stroke="#888888" stroke-width="3"/>
    <path d="M46 60 Q64 54 78 60" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round"/>
    <polyline points="80,40 90,56 110,28" fill="none" stroke="#2ecc71" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
