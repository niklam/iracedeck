<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a2a3a"/>

    <!-- Icon content area: eye shape with right-looking pupil -->
    <path d="M36 48 Q72 24 108 48 Q72 72 36 48 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="48" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="76" cy="48" r="4" fill="#ffffff"/>
    <!-- Right arrow indicator -->
    <path d="M112 76 L124 76 L116 68" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M124 76 L116 84" fill="none" stroke="#888888" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
