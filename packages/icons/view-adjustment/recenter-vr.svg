<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a2a3a"/>

    <!-- Recenter VR: VR headset with crosshair -->
    <rect x="32" y="28" width="80" height="40" rx="12" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="72" y1="28" x2="72" y2="68" stroke="#888888" stroke-width="1"/>
    <circle cx="56" cy="48" r="12" fill="none" stroke="#888888" stroke-width="2"/>
    <circle cx="88" cy="48" r="12" fill="none" stroke="#888888" stroke-width="2"/>
    <line x1="72" y1="16" x2="72" y2="24" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="72" y1="72" x2="72" y2="80" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="48" x2="28" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="116" y1="48" x2="124" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Inverted label: subLabel on top, mainLabel on bottom -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
