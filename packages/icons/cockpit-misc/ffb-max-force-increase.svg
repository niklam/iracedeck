<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a2a3a"/>

    <!-- Icon content area: Steering wheel with up arrow -->
    <circle cx="72" cy="48" r="24" fill="none" stroke="#ffffff" stroke-width="4"/>
    <circle cx="72" cy="48" r="8" fill="none" stroke="#888888" stroke-width="3"/>
    <line x1="72" y1="40" x2="72" y2="24" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="52" x2="48" y2="56" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="52" x2="96" y2="56" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <polyline points="104,44 112,32 120,44" fill="none" stroke="#f1c40f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
