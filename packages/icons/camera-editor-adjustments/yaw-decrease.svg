<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a2a3a"/>

    <!-- Camera with counter-clockwise yaw arc -->
    <rect x="44" y="28" width="40" height="32" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <polygon points="84,34 104,24 104,64 84,54" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M96 76 A24 12 0 0 1 48 76" fill="none" stroke="#888888" stroke-width="2"/>
    <polyline points="54,70 48,76 54,82" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
