<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a2a3a"/>

    <!-- Camera with downward arrow -->
    <rect x="36" y="24" width="48" height="36" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <polygon points="84,30 108,18 108,66 84,54" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <line x1="60" y1="60" x2="60" y2="80" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="54,74 60,80 66,74" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
