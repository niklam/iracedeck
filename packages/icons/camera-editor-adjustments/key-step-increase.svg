<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a2a3a"/>

    <!-- Timeline with step indicator pointing up -->
    <rect x="28" y="24" width="88" height="8" rx="2" fill="none" stroke="#888888" stroke-width="2"/>
    <rect x="28" y="24" width="56" height="8" rx="2" fill="#ffffff" fill-opacity="0.3"/>
    <line x1="40" y1="48" x2="40" y2="76" stroke="#888888" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="72" y1="48" x2="72" y2="76" stroke="#ffffff" stroke-width="3"/>
    <line x1="104" y1="48" x2="104" y2="76" stroke="#888888" stroke-width="2" stroke-dasharray="4,4"/>
    <polyline points="66,56 72,48 78,56" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
