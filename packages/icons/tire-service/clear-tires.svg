<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#3a2a2a"/>

    <!-- Tire outline with X overlay -->
    <circle cx="72" cy="52" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="52" r="8" fill="none" stroke="#888888" stroke-width="2"/>
    <line x1="58" y1="38" x2="86" y2="66" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
    <line x1="86" y1="38" x2="58" y2="66" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
