<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a3a2a"/>

    <!-- Icon content area: Steering wheel outline -->
    <circle cx="72" cy="44" r="28" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="72" cy="44" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="44" y1="44" x2="64" y2="44" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="80" y1="44" x2="100" y2="44" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="72" y1="52" x2="72" y2="72" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
