<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a3a2a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: Fence with arrow going over -->
    <line x1="32" y1="68" x2="32" y2="28" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="68" x2="60" y2="28" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="40" x2="60" y2="40" stroke="#888888" stroke-width="2"/>
    <line x1="32" y1="56" x2="60" y2="56" stroke="#888888" stroke-width="2"/>
    <path d="M72 60 Q84 16 108 32" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="100,24 108,32 100,36" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
