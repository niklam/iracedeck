<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a3a2a"/>

    <!-- Icon content area: Vertical rotation arc -->
    <path d="M72 20 A32 32 0 0 1 72 76" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <path d="M72 76 A32 32 0 0 1 72 20" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="6,6"/>
    <polyline points="66,26 72,20 78,26" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="72" cy="48" r="4" fill="#ffffff"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
