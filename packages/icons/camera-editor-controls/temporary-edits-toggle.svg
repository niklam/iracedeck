<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a3a2a"/>

    <!-- Icon content area: Pencil with clock indicator -->
    <line x1="40" y1="72" x2="84" y2="28" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="40" y1="72" x2="44" y2="60" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="72" x2="52" y2="68" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="60" r="16" fill="none" stroke="#888888" stroke-width="2"/>
    <line x1="100" y1="60" x2="100" y2="50" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="60" x2="108" y2="60" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
