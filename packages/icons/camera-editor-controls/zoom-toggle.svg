<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a3a2a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: Magnifying glass -->
    <circle cx="64" cy="40" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="78" y1="54" x2="100" y2="76" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="56" y1="40" x2="72" y2="40" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="32" x2="64" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
