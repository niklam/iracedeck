<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a3a2a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: Circular arrow with crosshair -->
    <circle cx="72" cy="44" r="24" fill="none" stroke="#888888" stroke-width="2"/>
    <path d="M72 20 A24 24 0 1 1 48 44" fill="none" stroke="{{graphic1Color}}" stroke-width="3" stroke-linecap="round"/>
    <polyline points="44,36 48,44 56,40" fill="none" stroke="{{graphic1Color}}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="72" cy="44" r="8" fill="none" stroke="{{graphic1Color}}" stroke-width="2"/>
    <line x1="72" y1="32" x2="72" y2="36" stroke="{{graphic1Color}}" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="52" x2="72" y2="56" stroke="{{graphic1Color}}" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="44" x2="64" y2="44" stroke="{{graphic1Color}}" stroke-width="2" stroke-linecap="round"/>
    <line x1="80" y1="44" x2="84" y2="44" stroke="{{graphic1Color}}" stroke-width="2" stroke-linecap="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
