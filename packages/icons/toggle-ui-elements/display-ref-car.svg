<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#1a3a3a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: car outline with ref marker -->
    <rect x="44" y="24" width="56" height="28" rx="8" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="36" y="36" width="12" height="16" rx="4" fill="none" stroke="#888888" stroke-width="2"/>
    <rect x="96" y="36" width="12" height="16" rx="4" fill="none" stroke="#888888" stroke-width="2"/>
    <line x1="60" y1="24" x2="60" y2="52" stroke="#888888" stroke-width="1"/>
    <line x1="84" y1="24" x2="84" y2="52" stroke="#888888" stroke-width="1"/>
    <text x="72" y="68" text-anchor="middle" fill="#2ecc71" font-family="Arial, sans-serif" font-size="12" font-weight="bold">REF</text>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
