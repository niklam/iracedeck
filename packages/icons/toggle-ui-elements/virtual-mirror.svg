<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#1a3a3a"/>

    <!-- Icon content area: mirror reflection -->
    <rect x="20" y="24" width="104" height="40" rx="6" fill="#0a1a1a" stroke="#888888" stroke-width="3"/>
    <rect x="28" y="30" width="88" height="28" rx="2" fill="#1a2a2a"/>
    <line x1="44" y1="32" x2="56" y2="54" stroke="#ffffff" stroke-width="3" opacity="0.4"/>
    <line x1="52" y1="32" x2="64" y2="54" stroke="#ffffff" stroke-width="2" opacity="0.25"/>
    <circle cx="88" cy="42" r="6" fill="#ffffff" opacity="0.15"/>
    <circle cx="100" cy="44" r="4" fill="#ffffff" opacity="0.1"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
