<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a3a4a"/>

    <!-- Icon content area: crosshair in green + P1 -->
    <circle cx="60" cy="48" r="20" fill="none" stroke="#2ecc71" stroke-width="4"/>
    <circle cx="60" cy="48" r="5" fill="#2ecc71"/>
    <line x1="60" y1="20" x2="60" y2="32" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="64" x2="60" y2="76" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
    <line x1="32" y1="48" x2="44" y2="48" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
    <line x1="76" y1="48" x2="88" y2="48" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
    <text x="108" y="36" text-anchor="middle" dominant-baseline="central"
          fill="#2ecc71" font-family="Arial, sans-serif" font-size="20" font-weight="bold">P1</text>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
