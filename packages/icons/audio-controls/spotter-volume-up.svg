<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a3a4a"/>

    <!-- Icon content area -->
    <path d="M40 40v24h12l16 16V24l-16 16h-12z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
    <path d="M80 34a16 16 0 0 1 0 36" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <path d="M88 24a28 28 0 0 1 0 56" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="108,44 116,32 124,44" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label (inverted layout: main on top, sub on bottom) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
