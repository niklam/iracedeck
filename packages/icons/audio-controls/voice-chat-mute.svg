<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a3a4a"/>

    <!-- Icon content area -->
    <rect x="60" y="20" width="24" height="40" rx="12" fill="none" stroke="#888888" stroke-width="4"/>
    <path d="M48 48v8a24 24 0 0 0 48 0v-8" fill="none" stroke="#888888" stroke-width="4" stroke-linecap="round"/>
    <line x1="72" y1="80" x2="72" y2="88" stroke="#888888" stroke-width="4" stroke-linecap="round"/>
    <line x1="44" y1="28" x2="100" y2="84" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>

    <!-- Two-line label (inverted layout: main on top, sub on bottom) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
