<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a1a3a"/>

    <!-- Icon content area: video camera with clock overlay -->
    <rect x="32" y="24" width="44" height="36" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <polygon points="76,30 96,20 96,64 76,54" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="104" cy="56" r="16" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="104" y1="56" x2="104" y2="46" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="104" y1="56" x2="112" y2="56" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
