<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a1a3a"/>

    <!-- Icon content area: still camera with magnification frame -->
    <rect x="32" y="28" width="52" height="40" rx="4" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="52" y="20" width="16" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="58" cy="48" r="10" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="58" cy="48" r="4" fill="#ffffff"/>
    <rect x="92" y="28" width="28" height="28" rx="2" fill="none" stroke="#888888" stroke-width="3"/>
    <line x1="96" y1="32" x2="100" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="96" y1="32" x2="96" y2="36" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="116" y1="52" x2="112" y2="52" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="116" y1="52" x2="116" y2="48" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

    <!-- Two-line label (subLabel on top subdued, mainLabel on bottom prominent) -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
