<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a3a4a"/>

    <!-- Steering wheel + right chevron -->
    <circle cx="66" cy="48" r="24" fill="none" stroke="#ffffff" stroke-width="4"/>
    <circle cx="66" cy="48" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="66" y1="56" x2="66" y2="72" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="48" x2="58" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="74" y1="48" x2="90" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <polyline points="112,40 124,48 112,56" fill="none" stroke="#2ecc71" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
