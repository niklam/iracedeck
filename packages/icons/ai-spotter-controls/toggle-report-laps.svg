<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#3a4a5a"/>

    <!-- Icon content area: lap counter / flag -->
    <rect x="44" y="24" width="56" height="40" rx="4" fill="none" stroke="#ffffff" stroke-width="4"/>
    <text x="72" y="48" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">LAP</text>
    <path d="M56 72v16M72 72v16M88 72v16" stroke="#f1c40f" stroke-width="3" stroke-linecap="round"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
