<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#3a4a5a"/>

    <!-- Icon content area: speaker with X (muted) -->
    <path d="M40 40v24h12l16 16V24l-16 16h-12z" fill="none" stroke="#888888" stroke-width="4" stroke-linejoin="round"/>
    <line x1="78" y1="40" x2="100" y2="64" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="40" x2="78" y2="64" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
