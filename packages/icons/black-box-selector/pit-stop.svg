<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a2a2a","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Black box frame -->
    <rect x="16" y="16" width="112" height="56" rx="6" fill="#2d2510" stroke="#4a3728" stroke-width="4"/>
    <path d="M32 56 l8 -8 l-4 -4 l16 -16 l6 6 l-16 16 l4 4 l-8 8 z" fill="#888888"/>
    <circle cx="60" cy="28" r="8" fill="none" stroke="#888888" stroke-width="3"/>
    <path d="M54 28 h12 M60 22 v12" stroke="#888888" stroke-width="2"/>
    <text x="84" y="32" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">FUEL</text>
    <text x="84" y="46" fill="#f39c12" font-family="Arial, sans-serif" font-size="10" font-weight="bold">+10.5</text>
    <text x="84" y="60" fill="#2ecc71" font-family="Arial, sans-serif" font-size="10">TIRES ✓</text>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
