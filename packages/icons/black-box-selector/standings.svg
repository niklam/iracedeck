<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#2a2a2a"/>

    <!-- Black box frame -->
    <rect x="16" y="16" width="112" height="56" rx="6" fill="#2d2510" stroke="#4a3728" stroke-width="4"/>
    <circle cx="28" cy="24" r="3" fill="#f39c12"/>
    <rect x="36" y="22" width="84" height="3" rx="1" fill="#ffffff"/>
    <circle cx="28" cy="32" r="3" fill="#f39c12" opacity="0.85"/>
    <rect x="36" y="30" width="72" height="3" rx="1" fill="#ffffff"/>
    <circle cx="28" cy="40" r="3" fill="#f39c12" opacity="0.7"/>
    <rect x="36" y="38" width="80" height="3" rx="1" fill="#ffffff"/>
    <circle cx="28" cy="48" r="3" fill="#f39c12" opacity="0.55"/>
    <rect x="36" y="46" width="64" height="3" rx="1" fill="#ffffff"/>
    <circle cx="28" cy="56" r="3" fill="#f39c12" opacity="0.4"/>
    <rect x="36" y="54" width="76" height="3" rx="1" fill="#ffffff"/>
    <circle cx="28" cy="64" r="3" fill="#f39c12" opacity="0.25"/>
    <rect x="36" y="62" width="68" height="3" rx="1" fill="#ffffff"/>

    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
