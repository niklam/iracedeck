<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#3a2a1a","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Icon content area: Engine block outline with brake symbol + right arrow -->
    <rect x="36" y="28" width="48" height="40" rx="6" fill="none" stroke="{{graphic1Color}}" stroke-width="3"/>
    <line x1="44" y1="28" x2="44" y2="20" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="60" y1="28" x2="60" y2="20" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <line x1="76" y1="28" x2="76" y2="20" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
    <circle cx="60" cy="48" r="8" fill="none" stroke="#e74c3c" stroke-width="3"/>
    <polyline points="106,56 116,44 106,32" fill="none" stroke="#f1c40f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
  </g>
</svg>
