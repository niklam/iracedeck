<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#8B1A1A","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>
    <!-- Checkered flag pattern -->
    <rect x="52" y="22" width="48" height="48" fill="none" stroke="#ffffff" stroke-width="3"/>
    <!-- Checkerboard pattern -->
    <rect x="52" y="22" width="12" height="12" fill="#ffffff"/>
    <rect x="76" y="22" width="12" height="12" fill="#ffffff"/>
    <rect x="64" y="34" width="12" height="12" fill="#ffffff"/>
    <rect x="88" y="34" width="12" height="12" fill="#ffffff"/>
    <rect x="52" y="46" width="12" height="12" fill="#ffffff"/>
    <rect x="76" y="46" width="12" height="12" fill="#ffffff"/>
    <rect x="64" y="58" width="12" height="12" fill="#ffffff"/>
    <rect x="88" y="58" width="12" height="12" fill="#ffffff"/>
    <!-- Flag pole -->
    <line x1="46" y1="22" x2="46" y2="82" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
