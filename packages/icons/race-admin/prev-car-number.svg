<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#8B1A1A"/>
    <!-- Left arrow with car/hash symbol -->
    <polyline points="44,50 32,50" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <line x1="34" y1="50" x2="56" y2="50" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <polyline points="44,38 32,50 44,62" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Car/hash symbol -->
    <rect x="64" y="34" width="44" height="32" rx="4" fill="none" stroke="#ffffff" stroke-width="4"/>
    <text x="86" y="52" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="bold">#</text>
    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
