<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#8B1A1A","textColor":"#ffffff","graphic1Color":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>
    <!-- Single column of cars/dots -->
    <rect x="62" y="22" width="20" height="12" rx="4" fill="{{graphic1Color}}"/>
    <rect x="62" y="40" width="20" height="12" rx="4" fill="{{graphic1Color}}"/>
    <rect x="62" y="58" width="20" height="12" rx="4" fill="{{graphic1Color}}"/>
    <rect x="62" y="76" width="20" height="12" rx="4" fill="none" stroke="{{graphic1Color}}" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Single file indicator -->
    <text x="72" y="20" text-anchor="middle" dominant-baseline="central"
          fill="{{graphic1Color}}" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
    <!-- Labels -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
