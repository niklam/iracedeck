<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <g filter="url(#activity-state)">
    <!-- Main background -->
    <rect x="0" y="0" width="144" height="144" rx="16" fill="#3a2a3a"/>

    <!-- Icon content area: chart line with toggle indicator -->
    <polyline points="28,56 44,36 60,48 76,24 92,40 108,20" fill="none"
              stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="108" cy="20" r="6" fill="#2ecc71"/>
    <line x1="28" y1="68" x2="116" y2="68" stroke="#888888" stroke-width="1.6"/>

    <!-- Two-line label -->
    <text x="72" y="104" text-anchor="middle" dominant-baseline="central"
          fill="#aaaaaa" font-family="Arial, sans-serif" font-size="16">{{subLabel}}</text>
    <text x="72" y="126" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">{{mainLabel}}</text>
  </g>
</svg>
