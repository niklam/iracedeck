<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="144"
   height="144"
   viewBox="0 0 144 144"
   version="1.1"
   id="svg1"
   xmlns="http://www.w3.org/2000/svg">
   <defs id="defs1">
      <style>
         @import
         url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&amp;display=swap');
      </style>
   </defs>
   <g id="layer1">
      <!-- Bottom background -->
      <path
         style="display:inline;fill:#00ff00;fill-opacity:1"
         d="m 0,100 v 44 H 144 V 100 Z"
         id="path1" />
      <!-- Top background -->
      <path
         style="fill:#000064;fill-opacity:1"
         d="M 0,0 V 100 L 144,100 V 0 Z"
         id="path2" />

      <!-- Section 1: 50x144. y=0 to 50, buffer=8px -> height=34. Center Y = 25 -->
      <text
         id="text-section-1"
         style="font-family:'Comfortaa', sans-serif;font-weight:700;font-size:32px;text-align:center;text-anchor:middle;dominant-baseline:central;fill:#ffffff;"
         x="72"
         y="25">{{mainLabel}}</text>

      <!-- Section 2: 50x144. y=50 to 100, buffer=8px -> height=34. Center Y = 75 -->
      <text
         id="text-section-2"
         style="font-family:'Comfortaa', sans-serif;font-weight:700;font-size:34px;text-align:center;text-anchor:middle;dominant-baseline:central;fill:#ffffff;"
         x="72"
         y="75">{{amountLabel}}</text>

      <!-- Section 3: 44x144. y=100 to 144, buffer=8px -> height=28. Center Y = 122 -->
      <text
         id="text-section-3"
         style="font-family:'Comfortaa', sans-serif;font-weight:700;font-size:26px;text-align:center;text-anchor:middle;dominant-baseline:central;fill:#000000;"
         x="72"
         y="122">{{subLabel}}</text>
   </g>
</svg>