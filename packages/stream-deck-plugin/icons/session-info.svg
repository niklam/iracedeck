<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <g filter="url(#activity-state)">
    <!-- Main background (dynamic color for flash effect) -->
    <rect x="0" y="0" width="72" height="72" rx="8" fill="{{backgroundColor}}"/>

    <!-- Title label at top -->
    <text x="36" y="16" text-anchor="middle" dominant-baseline="central"
          fill="#ffffff" font-family="Arial, sans-serif" font-size="9">{{titleLabel}}</text>

    <!-- Large centered value -->
    <text x="36" y="{{valueY}}" text-anchor="middle" dominant-baseline="central"
          fill="{{textColor}}" font-family="Arial, sans-serif" font-size="{{valueFontSize}}" font-weight="bold">{{value}}</text>
  </g>
</svg>
