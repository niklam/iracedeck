<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <desc>{"colors":{"backgroundColor":"#2a3444","textColor":"#ffffff"}}</desc>
  <g filter="url(#activity-state)">
    <!-- Main background (dynamic color for flash effect) -->
    <rect x="0" y="0" width="144" height="144" fill="{{backgroundColor}}"/>

    <!-- Title label at top -->
    <text x="72" y="32" text-anchor="middle" dominant-baseline="central"
          fill="{{titleColor}}" font-family="Arial, sans-serif" font-size="18">{{titleLabel}}</text>

    <!-- Value content (generated in JS for multiline support) -->
    {{valueContent}}
  </g>
</svg>
