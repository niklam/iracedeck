<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);

  // Per-action override preset buttons
  document.addEventListener('click', function(ev) {
    var btn = ev.target.closest('.ird-override-preset');
    if (!btn) return;
    var mapping = {
      bg: 'color-override-backgroundColor',
      text: 'color-override-textColor',
      g1: 'color-override-graphic1Color',
      g2: 'color-override-graphic2Color'
    };
    ['bg', 'text', 'g1', 'g2'].forEach(function(key) {
      var color = btn.getAttribute('data-' + key);
      var el = document.getElementById(mapping[key]);
      if (el && color) {
        el.value = color;
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
    });
  });

  // Global color preset buttons — apply a full set of global colors at once
  document.addEventListener('click', function(ev) {
    var btn = ev.target.closest('.ird-color-preset');
    if (!btn) return;
    var mapping = {
      bg: 'global-color-bg',
      text: 'global-color-text',
      g1: 'global-color-g1',
      g2: 'global-color-g2'
    };
    ['bg', 'text', 'g1', 'g2'].forEach(function(key) {
      var color = btn.getAttribute('data-' + key);
      var el = document.getElementById(mapping[key]);
      if (el && color) {
        el.value = color;
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
    });
  });

  // Color picker reset buttons — event delegation for all .ird-color-reset links
  // Per-action: resets to icon default color. Global: resets to #000001 (treated as "not set").
  document.addEventListener('click', function(ev) {
    var link = ev.target.closest('.ird-color-reset');
    if (!link) return;
    ev.preventDefault();
    var inputId = link.getAttribute('data-input');
    var defaultColor = link.getAttribute('data-default') || '#000000';
    var colorEl = document.getElementById(inputId);
    if (colorEl) {
      colorEl.value = defaultColor;
      colorEl.dispatchEvent(new Event('change', { bubbles: true }));
    }
  });
</script>

	</head>
	<body>
		<sdpi-item label="Control">
			<sdpi-select id="mode-select" setting="mode" default="play-pause">

					<option value="fast-forward">Fast Forward</option>
					<option value="rewind">Rewind</option>
					<option value="slow-motion">Slow Motion</option>
					<option value="frame-forward">Frame Forward</option>
					<option value="frame-backward">Frame Backward</option>
				</optgroup>
				<optgroup label="Speed">
					<option value="speed-increase">Increase Speed (Slow-Mo)</option>
					<option value="speed-decrease">Decrease Speed (Slow-Mo)</option>
					<option value="set-speed">Set Speed</option>
					<option value="speed-display">Speed Display</option>
				</optgroup>
				<optgroup label="Navigation">
					<option value="next-session">Next Session</option>
					<option value="prev-session">Previous Session</option>
					<option value="next-lap">Next Lap</option>
					<option value="prev-lap">Previous Lap</option>
					<option value="next-incident">Next Incident</option>
					<option value="prev-incident">Previous Incident</option>
					<option value="jump-to-beginning">Jump to Beginning</option>
					<option value="jump-to-live">Jump to Live</option>
				</optgroup>
				<optgroup label="Camera">
					<option value="jump-to-my-car">Jump to My Car</option>
					<option value="next-car">Next Car</option>
					<option value="prev-car">Previous Car</option>
					<option value="next-car-number">Next Car (Number Order)</option>
					<option value="prev-car-number">Previous Car (Number Order)</option>

			</sdpi-select>
		</sdpi-item>

		<sdpi-item id="speed-setting" label="Speed" class="hidden">
			<sdpi-select setting="speed" default="1">
				<optgroup label="Slow Motion">
					<option value="s16">1/16x</option>
					<option value="s15">1/15x</option>
					<option value="s14">1/14x</option>
					<option value="s13">1/13x</option>
					<option value="s12">1/12x</option>
					<option value="s11">1/11x</option>
					<option value="s10">1/10x</option>
					<option value="s9">1/9x</option>
					<option value="s8">1/8x</option>
					<option value="s7">1/7x</option>
					<option value="s6">1/6x</option>
					<option value="s5">1/5x</option>
					<option value="s4">1/4x</option>
					<option value="s3">1/3x</option>
					<option value="s2">1/2x</option>
				</optgroup>
				<optgroup label="Normal">
					<option value="1">1x (Normal)</option>
				</optgroup>
				<optgroup label="Fast">
					<option value="2">2x</option>
					<option value="3">3x</option>
					<option value="4">4x</option>
					<option value="5">5x</option>
					<option value="6">6x</option>
					<option value="7">7x</option>
					<option value="8">8x</option>
					<option value="9">9x</option>
					<option value="10">10x</option>
					<option value="11">11x</option>
					<option value="12">12x</option>
					<option value="13">13x</option>
					<option value="14">14x</option>
					<option value="15">15x</option>
					<option value="16">16x</option>
				</optgroup>
			</sdpi-select>
		</sdpi-item>

		<div class="ird-common-settings-section">
  <div class="ird-section-heading">Common Settings</div>
  <sdpi-item label="Flags Overlay">
    <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
  </sdpi-item>
</div>


		<!--
  Color Overrides Component

  Parameters:
    - slots: Array of slot names to show
    - defaults: Object mapping slot names to default hex colors
-->

<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Color Overrides</span>
  </summary>
  <div class="ird-collapsible-content">
    <sdpi-item label="Presets"><div style="display:flex;gap:6px;"><button class="ird-override-preset" data-bg="#000001" data-text="#000001" data-g1="#000001" data-g2="#000001" style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#2a2a2a;color:#808080;">Default</button><button class="ird-override-preset" data-bg="#ffffff" data-text="#000000" data-g1="#000000" data-g2="#000000" style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#ffffff;color:#000000;">White</button><button class="ird-override-preset" data-bg="#000000" data-text="#ffffff" data-g1="#ffffff" data-g2="#ffffff" style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#000000;color:#ffffff;">Black</button></div></sdpi-item><sdpi-item label="Background"><div style="display:flex;align-items:center;gap:6px;"><sdpi-color id="color-override-backgroundColor" setting="colorOverrides.backgroundColor" default="#2a3a4a"></sdpi-color><a href="#" class="ird-color-reset" data-input="color-override-backgroundColor" data-default="#2a3a4a" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Reset to default">&#x21BA;</a></div></sdpi-item>
<sdpi-item label="Text"><div style="display:flex;align-items:center;gap:6px;"><sdpi-color id="color-override-textColor" setting="colorOverrides.textColor" default="#ffffff"></sdpi-color><a href="#" class="ird-color-reset" data-input="color-override-textColor" data-default="#ffffff" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Reset to default">&#x21BA;</a></div></sdpi-item>
<sdpi-item label="Graphic 1"><div style="display:flex;align-items:center;gap:6px;"><sdpi-color id="color-override-graphic1Color" setting="colorOverrides.graphic1Color" default="#ffffff"></sdpi-color><a href="#" class="ird-color-reset" data-input="color-override-graphic1Color" data-default="#ffffff" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Reset to default">&#x21BA;</a></div></sdpi-item>
  </div>
</details>



		<!--
  Global Plugin Settings Component

  Displays plugin-wide settings in a collapsible "Global Settings" accordion.
  Settings are stored in global settings (shared across all action instances).
  Collapsed by default.
-->
<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Focus iRacing">
      <sdpi-checkbox
        setting="focusIRacingWindow"
        label="Focus iRacing window before sending keys"
        global
      ></sdpi-checkbox>
    </sdpi-item>
    <div style="padding: 0 16px 8px; font-size: 11px; color: #999;">
      Automatically focuses the iRacing window before sending key inputs.
      Enable if actions aren't working when iRacing is in the background.
    </div>
    <div class="ird-section-subtitle">Icon Colors</div>
    <sdpi-item label="Presets">
      <div style="display:flex;gap:6px;">
        <button class="ird-color-preset" data-bg="#000001" data-text="#000001" data-g1="#000001" data-g2="#000001"
          style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#2a2a2a;color:#808080;">Default</button>
        <button class="ird-color-preset" data-bg="#ffffff" data-text="#000000" data-g1="#000000" data-g2="#000000"
          style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#ffffff;color:#000000;">White</button>
        <button class="ird-color-preset" data-bg="#000000" data-text="#ffffff" data-g1="#ffffff" data-g2="#ffffff"
          style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#000000;color:#ffffff;">Black</button>
      </div>
    </sdpi-item>
    <sdpi-item label="Background">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-bg" setting="colorBackgroundColor" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-bg" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
    <sdpi-item label="Text">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-text" setting="colorTextColor" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-text" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
    <sdpi-item label="Graphic 1">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-g1" setting="colorGraphic1Color" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-g1" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
    <sdpi-item label="Graphic 2">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-g2" setting="colorGraphic2Color" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-g2" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
  
  </div>
</details>



		<script>
			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const modeSelect = document.getElementById("mode-select");
				if (modeSelect) {
					updateVisibility(modeSelect.value || "play-pause");

					modeSelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value);
					});
					modeSelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value);
					});

					let lastMode = modeSelect.value || "play-pause";
					setInterval(() => {
						const currentMode = modeSelect.value;
						if (currentMode && currentMode !== lastMode) {
							lastMode = currentMode;
							updateVisibility(currentMode);
						}
					}, 100);
				}
			}

			function updateVisibility(mode) {
				const speedSetting = document.getElementById("speed-setting");
				if (mode === "set-speed") {
					speedSetting?.classList.remove("hidden");
				} else {
					speedSetting?.classList.add("hidden");
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>
	</body>
</html>
