<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Adjustment">
			<sdpi-select id="adjustment-select" setting="adjustment" default="latitude">
				<option value="latitude">Latitude</option>
				<option value="longitude">Longitude</option>
				<option value="altitude">Altitude</option>
				<option value="yaw">Yaw</option>
				<option value="pitch">Pitch</option>
				<option value="fov-zoom">FOV Zoom</option>
				<option value="key-step">Key Step</option>
				<option value="vanish-x">VanishX</option>
				<option value="vanish-y">VanishY</option>
				<option value="blimp-radius">Blimp Radius</option>
				<option value="blimp-velocity">Blimp Velocity</option>
				<option value="mic-gain">Mic Gain</option>
				<option value="auto-set-mic-gain">Auto Set Mic Gain</option>
				<option value="f-number">F-number</option>
				<option value="focus-depth">Focus Depth</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Direction" id="direction-item">
			<sdpi-select setting="direction" default="increase">
				<option value="increase">Increase</option>
				<option value="decrease">Decrease</option>
			</sdpi-select>
		</sdpi-item>

		<div class="ird-common-settings-section">
  <div class="ird-section-heading">Common Settings</div>
  <sdpi-item label="Flags Overlay">
    <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
  </sdpi-item>
</div>


		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Latitude +">
    <ird-key-binding setting="camEditLatitudeIncrease" default="D" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Latitude -">
    <ird-key-binding setting="camEditLatitudeDecrease" default="A" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Longitude +">
    <ird-key-binding setting="camEditLongitudeIncrease" default="S" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Longitude -">
    <ird-key-binding setting="camEditLongitudeDecrease" default="W" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Altitude +">
    <ird-key-binding setting="camEditAltitudeIncrease" default="Alt+S" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Altitude -">
    <ird-key-binding setting="camEditAltitudeDecrease" default="Alt+W" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Yaw +">
    <ird-key-binding setting="camEditYawIncrease" default="Ctrl+D" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Yaw -">
    <ird-key-binding setting="camEditYawDecrease" default="Ctrl+A" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Pitch +">
    <ird-key-binding setting="camEditPitchIncrease" default="Ctrl+W" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Pitch -">
    <ird-key-binding setting="camEditPitchDecrease" default="Ctrl+S" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="FOV Zoom +">
    <ird-key-binding setting="camEditFovZoomIncrease" default="[" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="FOV Zoom -">
    <ird-key-binding setting="camEditFovZoomDecrease" default="]" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Key Step +">
    <ird-key-binding setting="camEditKeyStepIncrease" default="-" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Key Step -">
    <ird-key-binding setting="camEditKeyStepDecrease" default="=" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="VanishX +">
    <ird-key-binding setting="camEditVanishXIncrease" default="Alt+X" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="VanishX -">
    <ird-key-binding setting="camEditVanishXDecrease" default="Ctrl+X" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="VanishY +">
    <ird-key-binding setting="camEditVanishYIncrease" default="Alt+Y" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="VanishY -">
    <ird-key-binding setting="camEditVanishYDecrease" default="Ctrl+Y" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Blimp Radius +">
    <ird-key-binding setting="camEditBlimpRadiusIncrease" default="Ctrl+H" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Blimp Radius -">
    <ird-key-binding setting="camEditBlimpRadiusDecrease" default="Ctrl+G" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Blimp Velocity +">
    <ird-key-binding setting="camEditBlimpVelocityIncrease" default="Alt+H" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Blimp Velocity -">
    <ird-key-binding setting="camEditBlimpVelocityDecrease" default="Alt+G" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Mic Gain +">
    <ird-key-binding setting="camEditMicGainIncrease" default="Alt+Up" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Mic Gain -">
    <ird-key-binding setting="camEditMicGainDecrease" default="Alt+Down" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Auto Set Mic Gain">
    <ird-key-binding setting="camEditAutoSetMicGain" default="Ctrl+Alt+Down" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="F-number +">
    <ird-key-binding setting="camEditFNumberIncrease" default="Alt+U" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="F-number -">
    <ird-key-binding setting="camEditFNumberDecrease" default="Alt+I" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Focus Depth +">
    <ird-key-binding setting="camEditFocusDepthIncrease" default="Ctrl+U" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Focus Depth -">
    <ird-key-binding setting="camEditFocusDepthDecrease" default="Ctrl+I" global></ird-key-binding>
  </sdpi-item>
  
</div>


		<script>
			function updateVisibility(adjustment) {
				const directionItem = document.getElementById("direction-item");
				if (!directionItem) return;

				// Hide direction dropdown when Auto Set Mic Gain is selected
				directionItem.classList.toggle("hidden", adjustment === "auto-set-mic-gain");
			}

			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const adjustmentSelect = document.getElementById("adjustment-select");

				if (adjustmentSelect) {
					const initialValue = adjustmentSelect.value || "latitude";
					updateVisibility(initialValue);

					adjustmentSelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value || "latitude");
					});
					adjustmentSelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value || "latitude");
					});

					// Polling fallback for reliable detection
					let lastValue = adjustmentSelect.value || "latitude";
					setInterval(() => {
						const currentValue = adjustmentSelect.value;
						if (currentValue && currentValue !== lastValue) {
							lastValue = currentValue;
							updateVisibility(currentValue);
						}
					}, 100);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>

		<!--
  Global Plugin Settings Component

  Displays plugin-wide settings in a collapsible "Global Settings" accordion.
  Settings are stored in global settings (shared across all action instances).
  Collapsed by default.
-->
<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Focus iRacing">
      <sdpi-checkbox
        setting="focusIRacingWindow"
        label="Focus iRacing window before sending keys"
        global
      ></sdpi-checkbox>
    </sdpi-item>
    <div style="padding: 0 16px 8px; font-size: 11px; color: #999;">
      Automatically focuses the iRacing window before sending key inputs.
      Enable if actions aren't working when iRacing is in the background.
    </div>
  
  </div>
</details>


	</body>
</html>
