<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Action">
			<sdpi-select id="action-select" setting="action" default="change-all-tires">
				<option value="change-all-tires">Change All Tires</option>
				<option value="clear-tires">Clear Tires</option>
				<option value="toggle-tires">Toggle Tires</option>
				<option value="change-compound">Change Compound</option>
			</sdpi-select>
		</sdpi-item>

		<div id="tire-checkboxes" class="hidden">
			<sdpi-item label="Left Front">
				<sdpi-checkbox setting="lf" default="true"></sdpi-checkbox>
			</sdpi-item>
			<sdpi-item label="Right Front">
				<sdpi-checkbox setting="rf" default="true"></sdpi-checkbox>
			</sdpi-item>
			<sdpi-item label="Left Rear">
				<sdpi-checkbox setting="lr" default="true"></sdpi-checkbox>
			</sdpi-item>
			<sdpi-item label="Right Rear">
				<sdpi-checkbox setting="rr" default="true"></sdpi-checkbox>
			</sdpi-item>
		</div>

		<script>
			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const actionSelect = document.getElementById("action-select");
				if (actionSelect) {
					updateVisibility(actionSelect.value || "change-all-tires");

					actionSelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value || "change-all-tires");
					});
					actionSelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value || "change-all-tires");
					});

					// Polling fallback for reliable detection
					let lastAction = actionSelect.value || "change-all-tires";
					setInterval(() => {
						const currentAction = actionSelect.value;
						if (currentAction && currentAction !== lastAction) {
							lastAction = currentAction;
							updateVisibility(currentAction);
						}
					}, 100);
				}
			}

			function updateVisibility(actionType) {
				const checkboxes = document.getElementById("tire-checkboxes");
				if (actionType === "toggle-tires") {
					checkboxes?.classList.remove("hidden");
				} else {
					checkboxes?.classList.add("hidden");
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>

		<div class="ird-common-settings-section">
  <div class="ird-section-heading">Common Settings</div>
  <sdpi-item label="Flags Overlay">
    <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
  </sdpi-item>
</div>


		<!--
  Global Plugin Settings Component

  Displays plugin-wide settings in a collapsible "Global Settings" accordion.
  Settings are stored in global settings (shared across all action instances).
  Collapsed by default.
-->
<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Focus iRacing">
      <sdpi-checkbox
        setting="focusIRacingWindow"
        label="Focus iRacing window before sending keys"
        global
      ></sdpi-checkbox>
    </sdpi-item>
    <div style="padding: 0 16px 8px; font-size: 11px; color: #999;">
      Automatically focuses the iRacing window before sending key inputs.
      Enable if actions aren't working when iRacing is in the background.
    </div>
  
  </div>
</details>


	</body>
</html>
