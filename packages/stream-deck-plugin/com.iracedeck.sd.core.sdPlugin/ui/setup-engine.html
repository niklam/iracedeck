<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Setting">
			<sdpi-select setting="setting" default="engine-power">
				<option value="engine-power">Engine Power</option>
				<option value="throttle-shaping">Throttle Shaping</option>
				<option value="boost-level">Boost Level</option>
				<option value="launch-rpm">Launch RPM</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Direction">
			<sdpi-select setting="direction" default="increase">
				<option value="increase">Increase</option>
				<option value="decrease">Decrease</option>
			</sdpi-select>
		</sdpi-item>

		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Engine Power +">
    <ird-key-binding setting="setupEngineEnginePowerIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Engine Power -">
    <ird-key-binding setting="setupEngineEnginePowerDecrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Throttle Shaping +">
    <ird-key-binding setting="setupEngineThrottleShapingIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Throttle Shaping -">
    <ird-key-binding setting="setupEngineThrottleShapingDecrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Boost Level +">
    <ird-key-binding setting="setupEngineBoostLevelIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Boost Level -">
    <ird-key-binding setting="setupEngineBoostLevelDecrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Launch RPM +">
    <ird-key-binding setting="setupEngineLaunchRpmIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Launch RPM -">
    <ird-key-binding setting="setupEngineLaunchRpmDecrease" default="" global></ird-key-binding>
  </sdpi-item>
  
</div>

	</body>
</html>
