<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Control">
			<sdpi-select setting="control" default="damage-report">
				<option value="damage-report">Damage Report</option>
				<option value="weather-report">Weather Report</option>
				<option value="toggle-report-laps">Toggle Report Laps</option>
				<option value="announce-leader">Announce Leader at S/F Line</option>
				<option value="louder">Spotter Louder</option>
				<option value="quieter">Spotter Quieter</option>
				<option value="silence">Spotter Silence</option>
			</sdpi-select>
		</sdpi-item>

		<div class="ird-common-settings-section">
  <div class="ird-section-heading">Common Settings</div>
  <sdpi-item label="Flags Overlay">
    <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
  </sdpi-item>
</div>


		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Damage Report">
    <ird-key-binding setting="spotterDamageReport" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Weather Report">
    <ird-key-binding setting="spotterWeatherReport" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Toggle Report Laps">
    <ird-key-binding setting="spotterToggleReportLaps" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Announce Leader at S/F Line">
    <ird-key-binding setting="spotterAnnounceLeader" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Spotter Louder">
    <ird-key-binding setting="spotterLouder" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Spotter Quieter">
    <ird-key-binding setting="spotterQuieter" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Spotter Silence">
    <ird-key-binding setting="spotterSilence" default="" global></ird-key-binding>
  </sdpi-item>
  
</div>

	</body>
</html>
