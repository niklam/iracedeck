<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);

  // Per-action override preset buttons
  document.addEventListener('click', function(ev) {
    var btn = ev.target.closest('.ird-override-preset');
    if (!btn) return;
    var mapping = {
      bg: 'color-override-backgroundColor',
      text: 'color-override-textColor',
      g1: 'color-override-graphic1Color',
      g2: 'color-override-graphic2Color'
    };
    ['bg', 'text', 'g1', 'g2'].forEach(function(key) {
      var color = btn.getAttribute('data-' + key);
      var el = document.getElementById(mapping[key]);
      if (el && color) {
        el.value = color;
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
    });
  });

  // Global color preset buttons — apply a full set of global colors at once
  document.addEventListener('click', function(ev) {
    var btn = ev.target.closest('.ird-color-preset');
    if (!btn) return;
    var mapping = {
      bg: 'global-color-bg',
      text: 'global-color-text',
      g1: 'global-color-g1',
      g2: 'global-color-g2'
    };
    ['bg', 'text', 'g1', 'g2'].forEach(function(key) {
      var color = btn.getAttribute('data-' + key);
      var el = document.getElementById(mapping[key]);
      if (el && color) {
        el.value = color;
        el.dispatchEvent(new Event('change', { bubbles: true }));
      }
    });
  });

  // Color picker reset buttons — event delegation for all .ird-color-reset links
  // Per-action: resets to icon default color. Global: resets to #000001 (treated as "not set").
  document.addEventListener('click', function(ev) {
    var link = ev.target.closest('.ird-color-reset');
    if (!link) return;
    ev.preventDefault();
    var inputId = link.getAttribute('data-input');
    var defaultColor = link.getAttribute('data-default') || '#000000';
    var colorEl = document.getElementById(inputId);
    if (colorEl) {
      colorEl.value = defaultColor;
      colorEl.dispatchEvent(new Event('change', { bubbles: true }));
    }
  });
</script>

	</head>
	<body>
		<sdpi-item label="Command">
			<sdpi-select id="mode-select" setting="mode" default="yellow">
				<optgroup label="Race Control">
					<option value="yellow">Throw Yellow Flag</option>
					<option value="black-flag">Black Flag Driver</option>
					<option value="dq-driver">Disqualify Driver</option>
					<option value="show-dqs-field">Show Disqualifications (Field)</option>
					<option value="show-dqs-driver">Show Disqualifications (Driver)</option>
					<option value="clear-penalties">Clear Driver Penalties</option>
					<option value="clear-all">Clear All Penalties</option>
					<option value="wave-around">Wave Driver Around</option>
					<option value="eol">End of Line Penalty</option>
					<option value="pit-close">Close Pit Entrance</option>
					<option value="pit-open">Open Pit Entrance</option>
					<option value="pace-laps">Adjust Pace Laps</option>
					<option value="single-file-restart">Single-File Restart</option>
					<option value="double-file-restart">Double-File Restart</option>
				</optgroup>
				<optgroup label="Session Management">
					<option value="advance-session">Advance Session</option>
					<option value="grid-set">Delay Race Start</option>
					<option value="grid-start">Start Race</option>
					<option value="track-state">Track State (Rubber)</option>
				</optgroup>
				<optgroup label="Driver &amp; Chat Management">
					<option value="grant-admin">Grant Admin</option>
					<option value="revoke-admin">Revoke Admin</option>
					<option value="remove-driver">Remove Driver</option>
					<option value="enable-chat-all">Enable Chat (All)</option>
					<option value="enable-chat-driver">Enable Chat (Driver)</option>
					<option value="disable-chat-all">Disable Chat (All)</option>
					<option value="disable-chat-driver">Mute Driver</option>
					<option value="message-all">Message All Participants</option>
					<option value="rc-message">Race Control Message</option>
				</optgroup>
			</sdpi-select>
		</sdpi-item>

		<!-- Driver targeting (shown for modes that accept a driver parameter) -->
		<div id="driver-section" class="hidden">
			<sdpi-item label="Use Viewed Car">
				<sdpi-checkbox id="use-viewed-car" setting="useViewedCar" default="true"></sdpi-checkbox>
			</sdpi-item>
			<sdpi-item id="car-number-item" label="Car Number" class="hidden">
				<sdpi-textfield setting="carNumber" placeholder="e.g. 42"></sdpi-textfield>
			</sdpi-item>
		</div>

		<!-- Black flag penalty settings -->
		<div id="penalty-section" class="hidden">
			<sdpi-item label="Penalty Type">
				<sdpi-select setting="penaltyType" default="time">
					<option value="time">Time (seconds)</option>
					<option value="laps">Laps</option>
					<option value="drivethrough">Drive-Through</option>
				</sdpi-select>
			</sdpi-item>
			<sdpi-item id="penalty-value-item" label="Penalty Value">
				<sdpi-textfield setting="penaltyValue" default="30" placeholder="e.g. 30"></sdpi-textfield>
			</sdpi-item>
		</div>

		<!-- Pace laps settings -->
		<div id="pace-laps-section" class="hidden">
			<sdpi-item label="Operation">
				<sdpi-select setting="paceLapsOperation" default="+">
					<option value="+">Add (+)</option>
					<option value="-">Subtract (−)</option>
					<option value="=">Set (=)</option>
				</sdpi-select>
			</sdpi-item>
			<sdpi-item label="Laps">
				<sdpi-textfield setting="paceLapsValue" default="1" placeholder="e.g. 2"></sdpi-textfield>
			</sdpi-item>
		</div>

		<!-- Grid set (delay start) settings -->
		<div id="grid-set-section" class="hidden">
			<sdpi-item label="Minutes">
				<sdpi-textfield setting="gridSetMinutes" default="5" placeholder="1-10"></sdpi-textfield>
			</sdpi-item>
		</div>

		<!-- Track state settings -->
		<div id="track-state-section" class="hidden">
			<sdpi-item label="Track Usage %">
				<sdpi-textfield setting="trackStatePercent" default="50" placeholder="-1 to 100"></sdpi-textfield>
			</sdpi-item>
		</div>

		<!-- Message field (for commands with optional/required message) -->
		<div id="message-section" class="hidden">
			<sdpi-item label="Message">
				<sdpi-textarea setting="message" placeholder="Optional message (supports {{templates}})"></sdpi-textarea>
			</sdpi-item>
		</div>

		<div class="ird-common-settings-section">
  <div class="ird-section-heading">Common Settings</div>
  <sdpi-item label="Flags Overlay">
    <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
  </sdpi-item>
</div>


		<!--
  Color Overrides Component

  Parameters:
    - slots: Array of slot names to show
    - defaults: Object mapping slot names to default hex colors
-->

<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Color Overrides</span>
  </summary>
  <div class="ird-collapsible-content">
    <sdpi-item label="Presets"><div style="display:flex;gap:6px;"><button class="ird-override-preset" data-bg="#000001" data-text="#000001" data-g1="#000001" data-g2="#000001" style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#2a2a2a;color:#808080;">Default</button><button class="ird-override-preset" data-bg="#ffffff" data-text="#000000" data-g1="#000000" data-g2="#000000" style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#ffffff;color:#000000;">White</button><button class="ird-override-preset" data-bg="#000000" data-text="#ffffff" data-g1="#ffffff" data-g2="#ffffff" style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#000000;color:#ffffff;">Black</button></div></sdpi-item><sdpi-item label="Background"><div style="display:flex;align-items:center;gap:6px;"><sdpi-color id="color-override-backgroundColor" setting="colorOverrides.backgroundColor" default="#8B1A1A"></sdpi-color><a href="#" class="ird-color-reset" data-input="color-override-backgroundColor" data-default="#8B1A1A" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Reset to default">&#x21BA;</a></div></sdpi-item>
<sdpi-item label="Text"><div style="display:flex;align-items:center;gap:6px;"><sdpi-color id="color-override-textColor" setting="colorOverrides.textColor" default="#ffffff"></sdpi-color><a href="#" class="ird-color-reset" data-input="color-override-textColor" data-default="#ffffff" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Reset to default">&#x21BA;</a></div></sdpi-item>
<sdpi-item label="Graphic 1"><div style="display:flex;align-items:center;gap:6px;"><sdpi-color id="color-override-graphic1Color" setting="colorOverrides.graphic1Color" default="#ffffff"></sdpi-color><a href="#" class="ird-color-reset" data-input="color-override-graphic1Color" data-default="#ffffff" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Reset to default">&#x21BA;</a></div></sdpi-item>
  </div>
</details>



		<!--
  Global Plugin Settings Component

  Displays plugin-wide settings in a collapsible "Global Settings" accordion.
  Settings are stored in global settings (shared across all action instances).
  Collapsed by default.
-->
<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Focus iRacing">
      <sdpi-checkbox
        setting="focusIRacingWindow"
        label="Focus iRacing window before sending keys"
        global
      ></sdpi-checkbox>
    </sdpi-item>
    <div style="padding: 0 16px 8px; font-size: 11px; color: #999;">
      Automatically focuses the iRacing window before sending key inputs.
      Enable if actions aren't working when iRacing is in the background.
    </div>
    <div class="ird-section-subtitle">Icon Colors</div>
    <sdpi-item label="Presets">
      <div style="display:flex;gap:6px;">
        <button class="ird-color-preset" data-bg="#000001" data-text="#000001" data-g1="#000001" data-g2="#000001"
          style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#2a2a2a;color:#808080;">Default</button>
        <button class="ird-color-preset" data-bg="#ffffff" data-text="#000000" data-g1="#000000" data-g2="#000000"
          style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#ffffff;color:#000000;">White</button>
        <button class="ird-color-preset" data-bg="#000000" data-text="#ffffff" data-g1="#ffffff" data-g2="#ffffff"
          style="padding:4px 10px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px;background:#000000;color:#ffffff;">Black</button>
      </div>
    </sdpi-item>
    <sdpi-item label="Background">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-bg" setting="colorBackgroundColor" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-bg" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
    <sdpi-item label="Text">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-text" setting="colorTextColor" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-text" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
    <sdpi-item label="Graphic 1">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-g1" setting="colorGraphic1Color" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-g1" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
    <sdpi-item label="Graphic 2">
      <div style="display:flex;align-items:center;gap:6px;">
        <sdpi-color id="global-color-g2" setting="colorGraphic2Color" global></sdpi-color>
        <a href="#" class="ird-color-reset" data-input="global-color-g2" data-default="#000001" style="font-size:10px;color:#808080;text-decoration:none;white-space:nowrap;" title="Clear global override">&#x21BA;</a>
      </div>
    </sdpi-item>
  
  </div>
</details>



		<script>
			// Mode metadata for conditional visibility
			var MODE_META = {
				"yellow": { driver: false, message: true, extra: [] },
				"black-flag": { driver: true, message: false, extra: ["penalty-section"] },
				"dq-driver": { driver: true, message: true, extra: [] },
				"show-dqs-field": { driver: false, message: false, extra: [] },
				"show-dqs-driver": { driver: true, message: false, extra: [] },
				"clear-penalties": { driver: true, message: true, extra: [] },
				"clear-all": { driver: false, message: false, extra: [] },
				"wave-around": { driver: true, message: true, extra: [] },
				"eol": { driver: true, message: true, extra: [] },
				"pit-close": { driver: false, message: false, extra: [] },
				"pit-open": { driver: false, message: false, extra: [] },
				"pace-laps": { driver: false, message: false, extra: ["pace-laps-section"] },
				"single-file-restart": { driver: false, message: false, extra: [] },
				"double-file-restart": { driver: false, message: false, extra: [] },
				"advance-session": { driver: false, message: true, extra: [] },
				"grid-set": { driver: false, message: false, extra: ["grid-set-section"] },
				"grid-start": { driver: false, message: false, extra: [] },
				"track-state": { driver: false, message: false, extra: ["track-state-section"] },
				"grant-admin": { driver: true, message: true, extra: [] },
				"revoke-admin": { driver: true, message: true, extra: [] },
				"remove-driver": { driver: true, message: true, extra: [] },
				"enable-chat-all": { driver: false, message: false, extra: [] },
				"enable-chat-driver": { driver: true, message: false, extra: [] },
				"disable-chat-all": { driver: false, message: false, extra: [] },
				"disable-chat-driver": { driver: true, message: false, extra: [] },
				"message-all": { driver: false, message: true, extra: [] },
				"rc-message": { driver: false, message: true, extra: [] }
			};

			var ALL_EXTRA_SECTIONS = ["penalty-section", "pace-laps-section", "grid-set-section", "track-state-section"];

			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				var modeSelect = document.getElementById("mode-select");
				var useViewedCarCheckbox = document.getElementById("use-viewed-car");

				if (modeSelect) {
					updateModeVisibility(modeSelect.value || "yellow");

					modeSelect.addEventListener("change", function(ev) { updateModeVisibility(ev.target.value); });
					modeSelect.addEventListener("input", function(ev) { updateModeVisibility(ev.target.value); });

					var lastMode = modeSelect.value || "yellow";
					setInterval(function() {
						var currentMode = modeSelect.value;
						if (currentMode && currentMode !== lastMode) {
							lastMode = currentMode;
							updateModeVisibility(currentMode);
						}
					}, 100);
				}

				if (useViewedCarCheckbox) {
					useViewedCarCheckbox.addEventListener("change", function() { updateCarNumberVisibility(); });
					useViewedCarCheckbox.addEventListener("input", function() { updateCarNumberVisibility(); });

					var lastChecked = isCheckboxChecked(useViewedCarCheckbox);
					setInterval(function() {
						var current = isCheckboxChecked(useViewedCarCheckbox);
						if (current !== lastChecked) {
							lastChecked = current;
							updateCarNumberVisibility();
						}
					}, 100);
				}
			}

			function isCheckboxChecked(el) {
				// sdpi-checkbox value can be boolean or string
				var val = el.value;
				return val === true || val === "true";
			}

			function updateModeVisibility(mode) {
				var meta = MODE_META[mode] || { driver: false, message: false, extra: [] };

				toggle("driver-section", meta.driver);
				toggle("message-section", meta.message);

				// Hide all extra sections first, then show the ones for this mode
				for (var i = 0; i < ALL_EXTRA_SECTIONS.length; i++) {
					toggle(ALL_EXTRA_SECTIONS[i], false);
				}
				for (var j = 0; j < meta.extra.length; j++) {
					toggle(meta.extra[j], true);
				}

				// Update car number visibility based on checkbox state
				if (meta.driver) {
					updateCarNumberVisibility();
				}
			}

			function updateCarNumberVisibility() {
				var checkbox = document.getElementById("use-viewed-car");
				var carNumberItem = document.getElementById("car-number-item");
				if (checkbox && carNumberItem) {
					var useViewed = isCheckboxChecked(checkbox);
					carNumberItem.classList.toggle("hidden", useViewed);
				}
			}

			function toggle(id, show) {
				var el = document.getElementById(id);
				if (el) {
					el.classList.toggle("hidden", !show);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>
	</body>
</html>
