<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Component">
			<sdpi-select setting="setting" default="differential-preload">
				<option value="differential-preload">Differential Preload</option>
				<option value="differential-entry">Differential Entry</option>
				<option value="differential-middle">Differential Middle</option>
				<option value="differential-exit">Differential Exit</option>
				<option value="front-arb">Front ARB</option>
				<option value="rear-arb">Rear ARB</option>
				<option value="left-spring">Left Spring</option>
				<option value="right-spring">Right Spring</option>
				<option value="lf-shock">LF Shock</option>
				<option value="rf-shock">RF Shock</option>
				<option value="lr-shock">LR Shock</option>
				<option value="rr-shock">RR Shock</option>
				<option value="power-steering">Power Steering</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Direction">
			<sdpi-select setting="direction" default="increase">
				<option value="increase">Increase</option>
				<option value="decrease">Decrease</option>
			</sdpi-select>
		</sdpi-item>

		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Diff Preload +">
    <ird-key-binding setting="setupChassisDifferentialPreloadIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Diff Preload -">

  </sdpi-item>
  
  <sdpi-item label="Diff Entry +">

  </sdpi-item>
  
  <sdpi-item label="Diff Entry -">

  </sdpi-item>
  
  <sdpi-item label="Diff Middle +">

  <sdpi-item label="Left Spring +">
    <ird-key-binding setting="setupChassisLeftSpringIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Left Spring -">

  <sdpi-item label="Power Steering +">

</div>

	</body>
</html>
