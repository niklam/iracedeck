<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>

	</head>
	<body>
		<sdpi-item label="Setting">
			<sdpi-select id="setting-select" setting="setting" default="tc-toggle">
				<option value="tc-toggle">TC Toggle</option>
				<option value="tc-slot-1">TC Slot 1</option>
				<option value="tc-slot-2">TC Slot 2</option>
				<option value="tc-slot-3">TC Slot 3</option>
				<option value="tc-slot-4">TC Slot 4</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Direction" id="direction-item">
			<sdpi-select setting="direction" default="increase">
				<option value="increase">Increase</option>
				<option value="decrease">Decrease</option>
			</sdpi-select>
		</sdpi-item>

		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="TC Toggle">
    <ird-key-binding setting="setupTractionTcToggle" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 1 +">
    <ird-key-binding setting="setupTractionTcSlot1Increase" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 1 -">
    <ird-key-binding setting="setupTractionTcSlot1Decrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 2 +">
    <ird-key-binding setting="setupTractionTcSlot2Increase" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 2 -">
    <ird-key-binding setting="setupTractionTcSlot2Decrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 3 +">
    <ird-key-binding setting="setupTractionTcSlot3Increase" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 3 -">
    <ird-key-binding setting="setupTractionTcSlot3Decrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 4 +">
    <ird-key-binding setting="setupTractionTcSlot4Increase" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="TC Slot 4 -">
    <ird-key-binding setting="setupTractionTcSlot4Decrease" default="" global></ird-key-binding>
  </sdpi-item>
  
</div>


		<script>
			// TC Toggle is the only non-directional control
			function updateVisibility(setting) {
				const directionItem = document.getElementById("direction-item");
				if (!directionItem) return;
				directionItem.classList.toggle("hidden", setting === "tc-toggle");
			}

			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const settingSelect = document.getElementById("setting-select");

				if (settingSelect) {
					const initialValue = settingSelect.value || "tc-toggle";
					updateVisibility(initialValue);

					settingSelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value || "tc-toggle");
					});
					settingSelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value || "tc-toggle");
					});

					// Polling fallback for reliable detection
					let lastValue = settingSelect.value || "tc-toggle";
					setInterval(() => {
						const currentValue = settingSelect.value;
						if (currentValue && currentValue !== lastValue) {
							lastValue = currentValue;
							updateVisibility(currentValue);
						}
					}, 100);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>
	</body>
</html>
