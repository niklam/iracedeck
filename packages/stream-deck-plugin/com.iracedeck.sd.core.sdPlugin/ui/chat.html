<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Mode">
			<sdpi-select id="mode-select" setting="mode" default="send-message">
				<option value="send-message">Send Message</option>
				<option value="macro">Macro (1-15)</option>
				<option value="reply">Reply to Chat</option>
				<option value="respond-pm">Respond to Last PM</option>
				<option value="whisper">Whisper</option>
				<option value="open-chat">Open Chat</option>
				<option value="cancel">Cancel Chat</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Message Text" id="message-item" class="hidden">
			<sdpi-textarea setting="message" rows="3" placeholder="Enter message to send"></sdpi-textarea>
		</sdpi-item>

		<sdpi-item id="template-help" class="hidden">
			<div style="font-size: 12px; color: #9e9e9e; line-height: 1.5;">
				Supports <b>{{variable}}</b> placeholders for live data.
				<a href="https://iracedeck.com/docs/template-variables.html"
				   style="color: #4a90d9;"
				   target="_blank">View full list of template variables!</a>
			</div>
		</sdpi-item>

		<sdpi-item label="Macro Number" id="macro-item" class="hidden">
			<sdpi-select setting="macroNumber" default="1">
				
				<option value="1">Macro 1</option>
				
				<option value="2">Macro 2</option>
				
				<option value="3">Macro 3</option>
				
				<option value="4">Macro 4</option>
				
				<option value="5">Macro 5</option>
				
				<option value="6">Macro 6</option>
				
				<option value="7">Macro 7</option>
				
				<option value="8">Macro 8</option>
				
				<option value="9">Macro 9</option>
				
				<option value="10">Macro 10</option>
				
				<option value="11">Macro 11</option>
				
				<option value="12">Macro 12</option>
				
				<option value="13">Macro 13</option>
				
				<option value="14">Macro 14</option>
				
				<option value="15">Macro 15</option>
				
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Icon Color">
			<sdpi-color setting="iconColor" default="#4a90d9"></sdpi-color>
		</sdpi-item>

		<sdpi-item label="Key Text">
			<sdpi-textarea setting="keyText" rows="2" placeholder="Leave empty for default"></sdpi-textarea>
		</sdpi-item>

		<sdpi-item label="Font Size" id="font-size-item" class="hidden">
			<sdpi-textfield setting="fontSize" type="number" min="5" max="36" default="11"></sdpi-textfield>
		</sdpi-item>

		<div class="ird-common-settings-section">
  <div class="ird-section-heading">Common Settings</div>
  <sdpi-item label="Flags Overlay">
    <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
  </sdpi-item>
</div>


		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Whisper">
    <ird-key-binding setting="chatWhisper" default="" global></ird-key-binding>
  </sdpi-item>
  
</div>


		<script>
			function updateVisibility(mode) {
				const messageItem = document.getElementById("message-item");
				const macroItem = document.getElementById("macro-item");
				const templateHelp = document.getElementById("template-help");
				const fontSizeItem = document.getElementById("font-size-item");

				if (messageItem) {
					messageItem.classList.toggle("hidden", mode !== "send-message");
				}
				if (templateHelp) {
					templateHelp.classList.toggle("hidden", mode !== "send-message");
				}
				if (macroItem) {
					macroItem.classList.toggle("hidden", mode !== "macro");
				}
				if (fontSizeItem) {
					fontSizeItem.classList.toggle("hidden", mode !== "send-message" && mode !== "macro");
				}
			}

			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const modeSelect = document.getElementById("mode-select");
				if (modeSelect) {
					const initialValue = modeSelect.value || "send-message";
					updateVisibility(initialValue);

					modeSelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value || "send-message");
					});
					modeSelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value || "send-message");
					});

					// Polling fallback for reliable detection
					let lastMode = modeSelect.value || "send-message";
					setInterval(() => {
						const currentMode = modeSelect.value;
						if (currentMode && currentMode !== lastMode) {
							lastMode = currentMode;
							updateVisibility(currentMode);
						}
					}, 100);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>

		<!--
  Global Plugin Settings Component

  Displays plugin-wide settings in a collapsible "Global Settings" accordion.
  Settings are stored in global settings (shared across all action instances).
  Collapsed by default.
-->
<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Global Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Focus iRacing">
      <sdpi-checkbox
        setting="focusIRacingWindow"
        label="Focus iRacing window before sending keys"
        global
      ></sdpi-checkbox>
    </sdpi-item>
    <div style="padding: 0 16px 8px; font-size: 11px; color: #999;">
      Automatically focuses the iRacing window before sending key inputs.
      Enable if actions aren't working when iRacing is in the background.
    </div>
  
  </div>
</details>


	</body>
</html>
