<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Display Mode">
			<sdpi-select id="mode-select" setting="mode" default="incidents">
				<option value="incidents">Incident Points</option>
				<option value="time-remaining">Time Remaining</option>
				<option value="laps">Laps</option>
				<option value="position">Position</option>
				<option value="fuel">Fuel</option>
				<option value="flags">Race Flags</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item id="position-settings" label="Show Total Cars" class="hidden">
			<sdpi-checkbox setting="positionShowTotal"></sdpi-checkbox>
		</sdpi-item>

		<sdpi-item id="fuel-settings" label="Fuel Display" class="hidden">
			<sdpi-select setting="fuelFormat" default="amount">
				<option value="amount">Amount (L / gal)</option>
				<option value="percentage">Percentage</option>
			</sdpi-select>
		</sdpi-item>

		<script>
			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const modeSelect = document.getElementById("mode-select");
				if (!modeSelect) return;

				updateVisibility(modeSelect.value || "incidents");

				modeSelect.addEventListener("change", (ev) => updateVisibility(ev.target.value));
				modeSelect.addEventListener("input", (ev) => updateVisibility(ev.target.value));

				let lastMode = modeSelect.value || "incidents";
				setInterval(() => {
					const current = modeSelect.value;
					if (current && current !== lastMode) {
						lastMode = current;
						updateVisibility(current);
					}
				}, 100);
			}

			function updateVisibility(mode) {
				const positionSettings = document.getElementById("position-settings");
				const fuelSettings = document.getElementById("fuel-settings");

				if (positionSettings) {
					positionSettings.classList.toggle("hidden", mode !== "position");
				}
				if (fuelSettings) {
					fuelSettings.classList.toggle("hidden", mode !== "fuel");
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>

		<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Common Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Flags Overlay">
      <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
    </sdpi-item>
  
  </div>
</details>


	</body>
</html>
