<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Control">
			<sdpi-select setting="control" default="open-camera-tool">
				<option value="open-camera-tool">Open Camera Tool</option>
				<option value="key-acceleration-toggle">Key Acceleration Toggle</option>
				<option value="key-10x-toggle">Key 10x Toggle</option>
				<option value="parabolic-mic-toggle">Parabolic Mic Toggle</option>
				<option value="cycle-position-type">Cycle Position Type</option>
				<option value="cycle-aim-type">Cycle Aim Type</option>
				<option value="acquire-start">Acquire Start</option>
				<option value="acquire-end">Acquire End</option>
				<option value="temporary-edits-toggle">Temporary Edits Toggle</option>
				<option value="dampening-toggle">Dampening Toggle</option>
				<option value="zoom-toggle">Zoom Toggle</option>
				<option value="beyond-fence-toggle">Beyond Fence Toggle</option>
				<option value="in-cockpit-toggle">In Cockpit Toggle</option>
				<option value="mouse-navigation-toggle">Mouse Navigation Toggle</option>
				<option value="pitch-gyro-toggle">Pitch Gyro Toggle</option>
				<option value="roll-gyro-toggle">Roll Gyro Toggle</option>
				<option value="limit-shot-range-toggle">Limit Shot Range Toggle</option>
				<option value="show-camera-toggle">Show Camera Toggle</option>
				<option value="shot-selection-toggle">Shot Selection Toggle</option>
				<option value="manual-focus-toggle">Manual Focus Toggle</option>
				<option value="insert-camera">Insert Camera</option>
				<option value="remove-camera">Remove Camera</option>
				<option value="copy-camera">Copy Camera</option>
				<option value="paste-camera">Paste Camera</option>
				<option value="copy-group">Copy Group</option>
				<option value="paste-group">Paste Group</option>
				<option value="save-track-camera">Save Track Camera</option>
				<option value="load-track-camera">Load Track Camera</option>
				<option value="save-car-camera">Save Car Camera</option>
				<option value="load-car-camera">Load Car Camera</option>
			</sdpi-select>
		</sdpi-item>

		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Open Camera Tool">
    <ird-key-binding setting="camCtrlOpenCameraTool" default="Ctrl+F12" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Key Acceleration Toggle">
    <ird-key-binding setting="camCtrlKeyAccelerationToggle" default="Ctrl+P" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Key 10x Toggle">
    <ird-key-binding setting="camCtrlKey10xToggle" default="Alt+P" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Parabolic Mic Toggle">
    <ird-key-binding setting="camCtrlParabolicMicToggle" default="Ctrl+O" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Cycle Position Type">
    <ird-key-binding setting="camCtrlCyclePositionType" default="Alt+N" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Cycle Aim Type">
    <ird-key-binding setting="camCtrlCycleAimType" default="Alt+M" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Acquire Start">
    <ird-key-binding setting="camCtrlAcquireStart" default="Ctrl+Q" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Acquire End">
    <ird-key-binding setting="camCtrlAcquireEnd" default="Shift+Q" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Temporary Edits Toggle">
    <ird-key-binding setting="camCtrlTemporaryEditsToggle" default="Ctrl+L" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Dampening Toggle">
    <ird-key-binding setting="camCtrlDampeningToggle" default="Ctrl+N" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Zoom Toggle">
    <ird-key-binding setting="camCtrlZoomToggle" default="Ctrl+M" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Beyond Fence Toggle">
    <ird-key-binding setting="camCtrlBeyondFenceToggle" default="Ctrl+B" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="In Cockpit Toggle">
    <ird-key-binding setting="camCtrlInCockpitToggle" default="Alt+B" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Mouse Navigation Toggle">
    <ird-key-binding setting="camCtrlMouseNavigationToggle" default="Ctrl+Z" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Pitch Gyro Toggle">
    <ird-key-binding setting="camCtrlPitchGyroToggle" default="Ctrl+J" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Roll Gyro Toggle">
    <ird-key-binding setting="camCtrlRollGyroToggle" default="Alt+J" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Limit Shot Range Toggle">
    <ird-key-binding setting="camCtrlLimitShotRangeToggle" default="Alt+O" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Show Camera Toggle">
    <ird-key-binding setting="camCtrlShowCameraToggle" default="Alt+Q" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Shot Selection Toggle">
    <ird-key-binding setting="camCtrlShotSelectionToggle" default="Ctrl+T" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Manual Focus Toggle">
    <ird-key-binding setting="camCtrlManualFocusToggle" default="Ctrl+F" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Insert Camera">
    <ird-key-binding setting="camCtrlInsertCamera" default="Shift+Ctrl+Insert" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Remove Camera">
    <ird-key-binding setting="camCtrlRemoveCamera" default="Shift+Ctrl+Delete" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Copy Camera">
    <ird-key-binding setting="camCtrlCopyCamera" default="Shift+Ctrl+C" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Paste Camera">
    <ird-key-binding setting="camCtrlPasteCamera" default="Shift+Ctrl+V" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Copy Group">
    <ird-key-binding setting="camCtrlCopyGroup" default="Ctrl+Alt+C" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Paste Group">
    <ird-key-binding setting="camCtrlPasteGroup" default="Ctrl+Alt+V" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Save Track Camera">
    <ird-key-binding setting="camCtrlSaveTrackCamera" default="Ctrl+F11" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Load Track Camera">
    <ird-key-binding setting="camCtrlLoadTrackCamera" default="Shift+Ctrl+F11" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Save Car Camera">
    <ird-key-binding setting="camCtrlSaveCarCamera" default="Alt+F11" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Load Car Camera">
    <ird-key-binding setting="camCtrlLoadCarCamera" default="Shift+Alt+F11" global></ird-key-binding>
  </sdpi-item>
  
</div>

	</body>
</html>
