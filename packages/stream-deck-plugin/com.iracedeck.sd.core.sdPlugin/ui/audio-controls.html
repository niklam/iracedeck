<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Category">
			<sdpi-select id="category-select" setting="category" default="spotter">
				<option value="spotter">Spotter</option>
				<option value="voice-chat">Voice Chat</option>
				<option value="master">Master</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Action" id="action-item">
			<sdpi-select id="action-select" setting="action" default="volume-up">
				<option value="volume-up">Volume Up</option>
				<option value="volume-down">Volume Down</option>
				<option value="mute" id="mute-option">Mute / Silence</option>
			</sdpi-select>
		</sdpi-item>

		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Spotter Volume Up">
    <ird-key-binding setting="audioSpotterVolumeUp" default="Shift+Ctrl+numpad_add" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Spotter Volume Down">
    <ird-key-binding setting="audioSpotterVolumeDown" default="Shift+Ctrl+numpad_subtract" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Spotter Silence">
    <ird-key-binding setting="audioSpotterSilence" default="Shift+Ctrl+M" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Voice Chat Volume Up">
    <ird-key-binding setting="audioVoiceChatVolumeUp" default="Shift+Ctrl+Alt+numpad_add" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Voice Chat Volume Down">
    <ird-key-binding setting="audioVoiceChatVolumeDown" default="Shift+Ctrl+Alt+numpad_subtract" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Voice Chat Mute">
    <ird-key-binding setting="audioVoiceChatMute" default="Shift+Ctrl+Alt+M" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Master Volume Up">
    <ird-key-binding setting="audioMasterVolumeUp" default="Shift+Alt+numpad_add" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Master Volume Down">
    <ird-key-binding setting="audioMasterVolumeDown" default="Shift+Alt+numpad_subtract" global></ird-key-binding>
  </sdpi-item>
  
</div>


		<script>
			function updateVisibility(category) {
				const actionSelect = document.getElementById("action-select");
				const muteOption = document.querySelector('#action-select option[value="mute"]');
				if (!muteOption) return;

				if (category === "master") {
					muteOption.style.display = "none";
					// If mute was selected, switch to volume-up
					if (actionSelect && actionSelect.value === "mute") {
						actionSelect.value = "volume-up";
					}
				} else {
					muteOption.style.display = "";
				}
			}

			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const categorySelect = document.getElementById("category-select");

				if (categorySelect) {
					const initialValue = categorySelect.value || "spotter";
					updateVisibility(initialValue);

					categorySelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value || "spotter");
					});
					categorySelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value || "spotter");
					});

					// Polling fallback for reliable detection
					let lastValue = categorySelect.value || "spotter";
					setInterval(() => {
						const currentValue = categorySelect.value;
						if (currentValue && currentValue !== lastValue) {
							lastValue = currentValue;
							updateVisibility(currentValue);
						}
					}, 100);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>
	</body>
</html>
