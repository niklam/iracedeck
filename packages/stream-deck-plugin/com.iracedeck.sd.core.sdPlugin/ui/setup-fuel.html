<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
<script src="sdpi-components.js"></script>
<script src="pi-components.js"></script>
<style>
  .hidden {
    display: none !important;
  }

  /* Collapsible section styles */
  .ird-collapsible {
    margin-top: 12px;
  }

  .ird-collapsible-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px 0;
    cursor: pointer;
    user-select: none;
    list-style: none;
    border-top: 1px solid #3a3a3a;
  }

  .ird-collapsible-header::-webkit-details-marker {
    display: none;
  }

  .ird-collapsible-icon {
    font-size: 8px;
    color: #808080;
    transition: transform 0.15s ease;
    flex-shrink: 0;
  }

  .ird-collapsible[open] .ird-collapsible-icon {
    transform: rotate(90deg);
  }

  .ird-collapsible-title {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ird-collapsible-content {
    padding-top: 4px;
  }

  .ird-section-subtitle {
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    color: #d0d0d0;
    margin: 8px 0 4px 14px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Key bindings section styles */
  .ird-key-bindings-section {
    margin-top: 12px;
  }

  .ird-section-heading {
    padding: 8px 0 4px 0;
    border-top: 1px solid #3a3a3a;
    font-family: "Segoe UI", Arial, Roboto, Helvetica, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 9pt;
    font-weight: 600;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
</style>
<script>
  // sdpi-textfield and sdpi-textarea don't reliably apply the default attribute
  // for new action instances. Wait for settings to load, then fill empty fields.
  setTimeout(() => {
    document.querySelectorAll("sdpi-textfield[default][setting], sdpi-textarea[default][setting]").forEach((el) => {
      if (!el.value) {
        el.value = el.getAttribute("default");
      }
    });
  }, 500);
</script>

	</head>
	<body>
		<sdpi-item label="Setting">
			<sdpi-select id="setting-select" setting="setting" default="fuel-mixture">
				<option value="fuel-mixture">Fuel Mixture</option>
				<option value="fuel-cut-position">Fuel Cut Position</option>
				<option value="disable-fuel-cut">Disable Fuel Cut</option>
				<option value="low-fuel-accept">Low Fuel Accept</option>
				<option value="fcy-mode-toggle">FCY Mode Toggle</option>
			</sdpi-select>
		</sdpi-item>

		<sdpi-item label="Direction" id="direction-item">
			<sdpi-select setting="direction" default="increase">
				<option value="increase">Increase</option>
				<option value="decrease">Decrease</option>
			</sdpi-select>
		</sdpi-item>

		<!--
  Global Key Bindings Component

  Displays key binding inputs in a "Related Key Bindings" section.
  Key bindings are stored in global settings (shared across all action instances).

  Parameters:
    - keyBindings: Array with objects containing id, label, default, setting
-->
<div class="ird-key-bindings-section">
  <div class="ird-section-heading">Related Key Bindings</div>
  
  <sdpi-item label="Fuel Mixture +">
    <ird-key-binding setting="setupFuelFuelMixtureIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Fuel Mixture -">
    <ird-key-binding setting="setupFuelFuelMixtureDecrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Fuel Cut Position +">
    <ird-key-binding setting="setupFuelFuelCutPositionIncrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Fuel Cut Position -">
    <ird-key-binding setting="setupFuelFuelCutPositionDecrease" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Disable Fuel Cut">
    <ird-key-binding setting="setupFuelDisableFuelCut" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="Low Fuel Accept">
    <ird-key-binding setting="setupFuelLowFuelAccept" default="" global></ird-key-binding>
  </sdpi-item>
  
  <sdpi-item label="FCY Mode Toggle">
    <ird-key-binding setting="setupFuelFcyModeToggle" default="" global></ird-key-binding>
  </sdpi-item>
  
</div>


		<script>
			// Non-directional controls: hide direction dropdown
			const NON_DIRECTIONAL = new Set(["disable-fuel-cut", "low-fuel-accept", "fcy-mode-toggle"]);

			function updateVisibility(setting) {
				const directionItem = document.getElementById("direction-item");
				if (!directionItem) return;
				directionItem.classList.toggle("hidden", NON_DIRECTIONAL.has(setting));
			}

			async function initialize() {
				await customElements.whenDefined("sdpi-select");

				const settingSelect = document.getElementById("setting-select");

				if (settingSelect) {
					const initialValue = settingSelect.value || "fuel-mixture";
					updateVisibility(initialValue);

					settingSelect.addEventListener("change", (ev) => {
						updateVisibility(ev.target.value || "fuel-mixture");
					});
					settingSelect.addEventListener("input", (ev) => {
						updateVisibility(ev.target.value || "fuel-mixture");
					});

					// Polling fallback for reliable detection
					let lastValue = settingSelect.value || "fuel-mixture";
					setInterval(() => {
						const currentValue = settingSelect.value;
						if (currentValue && currentValue !== lastValue) {
							lastValue = currentValue;
							updateVisibility(currentValue);
						}
					}, 100);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initialize);
			} else {
				initialize();
			}
		</script>

		<style>
			.hidden { display: none !important; }
		</style>

		<!--
  Collapsible Component - A collapsible section with divider and arrow.
  Parameters: title (String), content (HTML String), open (Boolean, optional)
-->
<details class="ird-collapsible" >
  <summary class="ird-collapsible-header">
    <span class="ird-collapsible-icon">&#9654;</span>
    <span class="ird-collapsible-title">Common Settings</span>
  </summary>
  <div class="ird-collapsible-content">
    
    <sdpi-item label="Flags Overlay">
      <sdpi-checkbox setting="flagsOverlay" label="Flash flag colors on button"></sdpi-checkbox>
    </sdpi-item>
  
  </div>
</details>


	</body>
</html>
