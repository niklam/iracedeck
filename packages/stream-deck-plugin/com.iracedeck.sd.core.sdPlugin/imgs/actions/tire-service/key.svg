<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#3a2a2a"/>
  <!-- Car body (top half) -->
  <rect x="26" y="6" width="20" height="32" rx="3" fill="none" stroke="#888888" stroke-width="2"/>
  <!-- Left Front tire -->
  <rect x="14" y="8" width="8" height="10" rx="1.5" fill="#44FF44" stroke="#888888" stroke-width="1"/>
  <!-- Right Front tire -->
  <rect x="50" y="8" width="8" height="10" rx="1.5" fill="#44FF44" stroke="#888888" stroke-width="1"/>
  <!-- Left Rear tire -->
  <rect x="14" y="26" width="8" height="10" rx="1.5" fill="#44FF44" stroke="#888888" stroke-width="1"/>
  <!-- Right Rear tire -->
  <rect x="50" y="26" width="8" height="10" rx="1.5" fill="#44FF44" stroke="#888888" stroke-width="1"/>
  <!-- Title text -->
  <text x="36" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Change</text>
</svg>
