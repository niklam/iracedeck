<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#2a3a4a"/>
  <!-- Double chevrons for speed increase (green) -->
  <polyline points="22,14 36,26 22,38" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="36,14 50,26 36,38" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SPEED UP</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#aaaaaa" font-family="Arial, sans-serif" font-size="8">REPLAY</text>
</svg>
