<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#1a2a1a"/>

  <!-- TC Toggle icon: tire circle with "TC" text badge -->
  <circle cx="36" cy="24" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="36" cy="24" r="7" fill="none" stroke="#888888" stroke-width="1"/>
  <text x="36" y="25" text-anchor="middle" dominant-baseline="central"
        fill="#2ecc71" font-family="Arial, sans-serif" font-size="8" font-weight="bold">TC</text>

  <!-- Two-line label -->
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">TC</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="8">TOGGLE</text>
</svg>
