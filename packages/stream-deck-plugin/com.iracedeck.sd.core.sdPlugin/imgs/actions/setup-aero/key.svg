<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#1a1a3a"/>

  <!-- Front wing icon content (increase variant): wing profile + right arrow -->
