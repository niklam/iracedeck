<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#2a2a2a"/>

  <!-- Inner black box frame -->
  <rect x="8" y="8" width="56" height="28" rx="3" fill="#2d2510" stroke="#4a3728" stroke-width="2"/>

  <!-- Generic list content (representing black box data) -->
  <circle cx="14" cy="14" r="1.5" fill="#f39c12"/>
  <rect x="18" y="13" width="42" height="2" rx="0.5" fill="#ffffff"/>
  <circle cx="14" cy="20" r="1.5" fill="#f39c12" opacity="0.7"/>
  <rect x="18" y="19" width="36" height="2" rx="0.5" fill="#ffffff"/>
  <circle cx="14" cy="26" r="1.5" fill="#f39c12" opacity="0.4"/>
  <rect x="18" y="25" width="40" height="2" rx="0.5" fill="#ffffff"/>
  <circle cx="14" cy="32" r="1.5" fill="#f39c12" opacity="0.2"/>
  <rect x="18" y="31" width="32" height="2" rx="0.5" fill="#ffffff"/>

  <!-- Two-line label -->
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">BLACK BOX</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#aaaaaa" font-family="Arial, sans-serif" font-size="8">SELECTOR</text>
</svg>
