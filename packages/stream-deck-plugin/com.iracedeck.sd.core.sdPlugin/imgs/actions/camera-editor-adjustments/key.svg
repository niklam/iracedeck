<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#1a2a3a"/>

  <!-- Camera body with crosshair (position group) -->
  <rect x="18" y="12" width="24" height="18" rx="2" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <polygon points="42,15 54,9 54,33 42,27" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- XYZ axis arrows -->
  <line x1="30" y1="30" x2="30" y2="38" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="27,35 30,38 33,35" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two-line label (inverted: secondary top, primary bottom) -->
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="8">LATITUDE</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">+</text>
</svg>
