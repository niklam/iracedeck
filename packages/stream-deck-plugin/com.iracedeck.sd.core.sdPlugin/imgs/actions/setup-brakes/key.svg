<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#3a2a1a"/>

  <!-- Brake bias icon: horizontal bar showing front/rear balance + increase arrow -->
  <rect x="14" y="20" width="44" height="10" rx="3" fill="none" stroke="#888888" stroke-width="1.5"/>
  <rect x="14" y="20" width="26" height="10" rx="3" fill="#e74c3c" opacity="0.6"/>
  <line x1="40" y1="18" x2="40" y2="32" stroke="#ffffff" stroke-width="1.5"/>
  <polyline points="53,28 58,22 53,16" fill="none" stroke="#f1c40f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two-line label -->
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">BRAKE BIAS</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="8">INCREASE</text>
</svg>
