<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72">
  <!-- Main background -->
  <rect x="0" y="0" width="72" height="72" rx="8" fill="#2a3a4a"/>

  <!-- Skip-forward icon: triangle + vertical bar -->
  <polygon points="24,14 44,26 24,38" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
  <line x1="48" y1="14" x2="48" y2="38" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Two-line label -->
  <text x="36" y="52" text-anchor="middle" dominant-baseline="central"
        fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">NEXT</text>
  <text x="36" y="63" text-anchor="middle" dominant-baseline="central"
        fill="#aaaaaa" font-family="Arial, sans-serif" font-size="8">SESSION</text>
</svg>
