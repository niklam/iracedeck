name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Stream Deck...
        2. Press the action...
        3. See error...
    validations:
      required: true

  - type: input
    id: iracing-version
    attributes:
      label: iRacing version
      placeholder: e.g. 2025 Season 2 Patch 3

  - type: input
    id: stream-deck
    attributes:
      label: Stream Deck model and software version
      placeholder: e.g. Stream Deck MK.2, software 6.8

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant logs from the Stream Deck plugin logs folder.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, or anything else that might help.
