name: Release - Build Stream Dock Plugin

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Remove dev dependencies
        run: pnpm install --prod --no-frozen-lockfile

      - name: Pack Stream Dock plugin
        run: |
          $version = if ("${{ github.ref_name }}".StartsWith("v")) { "${{ github.ref_name }}".TrimStart("v") } else { "dev" }
          npx @elgato/cli@latest pack packages/stream-dock-plugin/com.iracedeck.sd.core.sdPlugin --force --ignore-validation
          Rename-Item "com.iracedeck.sd.core.streamDeckPlugin" "iracedeck-mirabox-v${version}.sdPlugin"
          Copy-Item "iracedeck-mirabox-v${version}.sdPlugin" "iracedeck-mirabox-latest.sdPlugin"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdock-plugin
          path: iracedeck-mirabox-*.sdPlugin

      - name: Attach plugin to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iracedeck-mirabox-*.sdPlugin
