name: Deploy to Firebase Hosting on release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v1.7.0) — optional for manual runs"
        type: string
  workflow_call:
    inputs:
      version:
        description: "Release version tag (e.g., v1.7.0)"
        required: true
        type: string

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install

      - name: Build website
        run: pnpm --filter @iracedeck/website build
        env:
          PUBLIC_IRACEDECK_VERSION: ${{ inputs.version || '' }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IRACEDECK }}
          channelId: live
          projectId: iracedeck
          entryPoint: packages/website
