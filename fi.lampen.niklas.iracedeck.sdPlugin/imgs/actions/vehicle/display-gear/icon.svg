<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Gear shift pattern (H-pattern) -->
  <line x1="5" y1="4" x2="5" y2="10"/>
  <line x1="10" y1="4" x2="10" y2="16"/>
  <line x1="15" y1="4" x2="15" y2="10"/>
  <line x1="5" y1="10" x2="15" y2="10"/>
  <!-- Gear knob -->
  <circle cx="10" cy="16" r="2" fill="#FFFFFF" stroke="none"/>
</svg>
